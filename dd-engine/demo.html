<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DD Engine — Demo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14;--surf:#0e1420;--surf2:#141b28;--border:#1c2438;
  --blue:#4a7cff;--blue-d:rgba(74,124,255,.1);--green:#22d3a0;
  --red:#f43f5e;--amber:#f59e0b;--gold:#fbbf24;--purple:#a78bfa;
  --text:#dde4f5;--muted:#5a6787;--dim:#2a3450;
  --ff:'Segoe UI',system-ui,sans-serif;--ffm:'Consolas',monospace;
  --r:6px;--rl:10px;
}
html,body{height:100%;font-family:var(--ff);background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
input,select{font-family:inherit;color:var(--text);background:var(--surf2);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;outline:none;width:100%;font-size:13px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.fu{animation:fadeUp .2s ease both}
.pulse{animation:pulse 1.4s ease infinite}
/* layout */
.app{display:flex;flex-direction:column;height:100vh}
header{background:var(--surf);border-bottom:1px solid var(--border);padding:13px 24px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.h-logo{font-family:var(--ffm);font-size:11px;font-weight:700;color:var(--blue);letter-spacing:.15em;text-transform:uppercase}
.h-sub{font-size:11px;color:var(--muted);margin-top:1px}
.body{flex:1;display:grid;grid-template-columns:360px 1fr;overflow:hidden}
.left-panel{border-right:1px solid var(--border);overflow-y:auto;padding:16px}
.right-panel{overflow-y:auto;padding:20px}
/* cards */
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:12px}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;white-space:nowrap}
/* buttons */
.btn-p{background:var(--blue);color:#fff;padding:7px 16px;border-radius:var(--r);font-weight:600;font-size:12px;white-space:nowrap}
.btn-p:hover{opacity:.85}
.btn-g{background:var(--surf2);color:var(--muted);border:1px solid var(--border);padding:6px 13px;border-radius:var(--r);font-size:12px}
/* upload zone */
.upload-zone{border:2px dashed var(--border);border-radius:var(--rl);padding:24px;text-align:center;cursor:pointer;transition:all .15s;background:var(--surf2);margin-bottom:14px}
.upload-zone:hover,.upload-zone.drag{border-color:var(--blue);background:var(--blue-d)}
/* doc rows */
.doc-row{padding:10px 12px;border-radius:var(--r);cursor:pointer;margin-bottom:5px;border-left:3px solid transparent;transition:all .12s}
.doc-row:hover{background:var(--surf2)}
.doc-row.active{background:var(--blue-d);border-left-color:var(--blue)}
/* analysis tabs */
.a-tab{padding:5px 13px;border-radius:var(--r);border:1.5px solid var(--border);background:var(--surf2);font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .12s}
.a-tab.active{border-color:var(--blue);background:var(--blue-d);color:var(--blue);font-weight:600}
/* section card */
.s-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:14px}
.s-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
/* metric grid */
.m-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.m-box{background:var(--surf2);border-radius:var(--r);padding:10px 12px;border:1px solid var(--border)}
.m-lbl{font-size:10px;color:var(--muted);margin-bottom:4px}
.m-val{font-family:var(--ffm);font-size:18px;font-weight:600}
/* risk flags */
.flag{padding:10px 14px;border-radius:var(--r);margin-bottom:7px;border-left:3px solid}
.flag .f-hdr{display:flex;gap:7px;align-items:center;margin-bottom:4px}
.flag p{font-size:12px;color:var(--muted);line-height:1.6}
.flag .mitigation{font-size:11px;color:var(--green);margin-top:4px}
/* lbl */
.lbl{display:block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;font-weight:700}
/* toast */
.toast-wrap{position:fixed;bottom:18px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:6px}
.toast{background:var(--surf);border-left:3px solid var(--green);padding:9px 14px;border-radius:var(--r);font-size:13px;animation:fadeUp .2s ease both;border:1px solid rgba(34,211,160,.3);max-width:280px}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="toast-wrap" id="toasts"></div>
<script>
// ── Mock data ─────────────────────────────────────────────────────────────────
const TYPE_LBL={pitch_deck:'Pitch Deck',financial_model:'Financial Model',income_statement:'Income Statement',balance_sheet:'Balance Sheet',cash_flow:'Cash Flow',audit_report:'Audit Report',legal_contract:'Legal Contract',term_sheet:'Term Sheet',cim:'CIM',other:'Other'};
const SEV_COLOR={critical:'#f43f5e',high:'#f59e0b',medium:'#4a7cff',low:'#22d3a0',info:'#a78bfa'};
const SEV_BG={critical:'rgba(244,63,94,.1)',high:'rgba(245,158,11,.1)',medium:'rgba(74,124,255,.1)',low:'rgba(34,211,160,.08)',info:'rgba(167,139,250,.1)'};

let docs=[

  {id:'doc2',title:'Lagos Logistics Hub — CIM',doc_type:'cim',company_name:'LLH Properties Ltd',deal_name:'Lagos Logistics',status:'complete',pages:68,size:'7.3 MB',uploaded:'2024-11-20'},
  {id:'doc3',title:'MicroLend — Shareholder Agreement',doc_type:'legal_contract',company_name:'MicroLend SA',deal_name:'MicroLend Fintech',status:'complete',pages:28,size:'1.8 MB',uploaded:'2024-11-28'},

  {id:'doc5',title:'GreenPower Senegal — Financial Projections',doc_type:'financial_model',company_name:'GreenPower SN',deal_name:'GreenPower',status:'complete',pages:22,size:'2.6 MB',uploaded:'2024-12-03'},
];

const analyses={
  doc1:{
    classification:{document_type:'audit_report',confidence:.96,company_name:'Acme Manufacturing SA',period:'FY2023',data_quality:'high',summary:'Audited financial statements for FY2023 prepared by PwC. Covers P&L, balance sheet, and notes. Clean opinion with one emphasis of matter paragraph regarding customer concentration.',key_topics:['Revenue','EBITDA','Audit Opinion','Customer Concentration']},
    financial:{period:'FY2023',currency:'USD',income_statement:{revenue:12400000,gross_profit:4960000,ebitda:2232000,ebit:1860000,net_income:1240000},balance_sheet:{cash:880000,total_assets:8200000,total_liabilities:3280000,total_equity:4920000,total_debt:2100000},ratios:{gross_margin_pct:40,ebitda_margin_pct:18,net_margin_pct:10,debt_to_equity:0.43,revenue_growth_pct:22},historical_data:[{year:'2021',revenue:8300000,ebitda:1245000},{year:'2022',revenue:10200000,ebitda:1734000},{year:'2023',revenue:12400000,ebitda:2232000}],red_flags:['Top 3 customers represent 62% of revenue','Receivables days increased from 38 to 52']},
    risk:{overall_risk_score:5,overall_risk_level:'medium',investment_recommendation:'proceed_with_caution',summary:'Acme Manufacturing presents a medium-risk profile. Strong revenue growth and improving EBITDA margins are offset by significant customer concentration and increasing receivables. Management quality appears strong.',risk_flags:[{severity:'high',category:'commercial',title:'Customer concentration risk',detail:'Top 3 customers = 62% of FY2023 revenue. Loss of one major client would materially impact earnings.',source_text:'Customer A (28%), Customer B (19%), Customer C (15%)',mitigation:'Negotiate long-term supply agreements. Accelerate diversification to 5+ anchor customers before exit.'},{severity:'medium',category:'financial',title:'Receivables deterioration',detail:'Days receivables outstanding increased from 38 to 52 days. May indicate collection pressure or customer cash flow issues.',mitigation:'Review customer payment terms. Implement credit management process.'},{severity:'low',category:'operational',title:'Single production facility',detail:'All manufacturing operations at one site in Douala. No business continuity plan documented.',mitigation:'Develop BCP. Consider insurance coverage for operational disruption.'}],strengths:['22% revenue CAGR 2021-2023','EBITDA margin expansion from 15% to 18%','Clean audit opinion','Low leverage (D/E 0.43x)'],diligence_gaps:['Management accounts Q3 2024','Customer contracts and renewal schedule','Capex plan for next 3 years']},
    summary:{headline:'Strong growth profile with manageable concentration risk — proceed with caution',executive_summary:'Acme Manufacturing SA demonstrates strong operational execution with 22% revenue CAGR and improving EBITDA margins. The primary risk is customer concentration (top 3 = 62% revenue) which is high but not unusual for a business of this size in the region. Leverage is conservative and the audit opinion is clean.',key_highlights:['Revenue grew 49% from 2021 to 2023','EBITDA margin improved from 15% to 18%','Net debt/EBITDA of 0.54x — conservative','Clean PwC audit opinion'],key_concerns:['Top 3 customers = 62% of revenue','Receivables days +14 days YoY','No long-term customer contracts documented'],next_steps:['Obtain Q3 2024 management accounts','Request full customer contract schedule','Commission independent market study']}
  },
  doc2:{
    classification:{document_type:'cim',confidence:.93,company_name:'LLH Properties Ltd',period:'2024',data_quality:'high',summary:'Comprehensive information memorandum for the Lagos Logistics Hub acquisition. Covers asset description, financial performance, tenancy schedule and investment thesis.',key_topics:['Grade-A Logistics','Lagos FTZ','Tenancy Schedule','Investment Returns']},
    risk:{overall_risk_score:4,overall_risk_level:'medium',investment_recommendation:'proceed_with_caution',summary:'Lagos Logistics Hub presents an attractive risk-adjusted return profile. The asset quality is high and the tenant base is strong. Primary risks are FX exposure and regulatory changes in the free trade zone.',risk_flags:[{severity:'high',category:'market',title:'USD/NGN currency exposure',detail:'Asset priced in USD but rental income collected in NGN. Significant FX risk given naira volatility.',mitigation:'Structure lease agreements with USD indexation clause. Consider FX hedging strategy.'},{severity:'medium',category:'compliance',title:'FTZ regulatory dependency',detail:'Asset value and tenant operations depend on continued Lagos FTZ status.',mitigation:'Conduct legal due diligence on FTZ agreements. Obtain regulatory comfort letter.'}],strengths:['85% pre-leased to multinationals','Grade-A asset specification','Favourable lease terms with 5-year WALTs'],diligence_gaps:['Title search and land registry verification','Full tenancy agreement review','Environmental assessment']},
    summary:{headline:'Quality logistics asset with strong tenant base — FX management required',executive_summary:'The Lagos Logistics Hub is a Grade-A facility in a prime location with a strong multinational tenant base. The 85% pre-let position provides good income visibility. Key focus areas for due diligence should be FX risk management and FTZ regulatory stability.',key_highlights:['85% pre-leased, 5-year average WALT','Grade-A specification, 2022 completion','Multinational tenant base (DHL, Maersk)','Strong logistics demand fundamentals in Lagos'],key_concerns:['USD/NGN FX exposure on rental income','FTZ regulatory uncertainty','Remaining 15% vacancy to be filled'],next_steps:['Instruct Lagos solicitors for title search','Negotiate FX indexation in lease templates','Obtain FTZ comfort letter from NEPZA']}
  },
  doc3:{
    classification:{document_type:'legal_contract',confidence:.98,company_name:'MicroLend SA',period:'2024',data_quality:'high',summary:'Shareholder agreement governing the equity structure, governance and exit rights for MicroLend SA. Standard West African private equity documentation with some unusual provisions.',key_topics:['Governance','Drag-Along','Tag-Along','Exit Rights']},
    legal:{document_type:'Shareholder Agreement',parties:['Prime Alpha Securities','MicroLend SA','SAVANA Capital Partners'],governing_law:'OHADA Uniform Act',effective_date:'2024-09-15',key_terms:{valuation:'Entry at 3.2x Revenue multiple',consideration:'$1,000,000 for 22% equity stake',conditions_precedent:['Regulatory approval from BCEAO','Completion of financial due diligence','Board composition changes'],representations_warranties:'Standard OHADA reps and warranties with 18-month survival period',termination_rights:'Either party may terminate for material breach with 30-day cure period',change_of_control:'Tag-along rights triggered on change of control. Drag-along exercisable by >50% shareholders.',exclusivity:'90-day exclusivity period from signing',non_compete:'36-month non-compete for founders within ECOWAS region',ip_ownership:'All IP confirmed owned by MicroLend SA'},obligations:[{party:'Prime Alpha Securities',obligation:'Pay consideration within 5 business days of CP satisfaction',deadline:'5 business days post-CP'},{party:'MicroLend SA',obligation:'Provide monthly management accounts',deadline:'15th of each month'}],risk_provisions:['Founder lock-up only 12 months — shorter than market standard of 24 months','No ratchet mechanism for underperformance','Information rights limited to quarterly — should be monthly'],analyst_notes:'Generally well-drafted OHADA documentation. Flag the short founder lock-up and limited information rights for negotiation. Recommend upgrading to monthly information rights before signing.'},
    risk:{overall_risk_score:3,overall_risk_level:'low',investment_recommendation:'proceed',summary:'Legal structure is sound with standard OHADA documentation. Two provisions warrant negotiation: founder lock-up should be extended to 24 months and information rights upgraded to monthly.',risk_flags:[{severity:'medium',category:'legal',title:'Short founder lock-up period',detail:'12-month lock-up is below market standard of 24 months for seed-stage fintech investments.',mitigation:'Negotiate extension to 24 months as condition of investment.'},{severity:'low',category:'legal',title:'Quarterly information rights only',detail:'Standard practice is monthly management accounts. Quarterly limits monitoring capability.',mitigation:'Request amendment to Clause 8.2 to provide monthly management accounts.'}],strengths:['Clean OHADA structure','Standard representations and warranties','Strong drag-along provisions for exit'],diligence_gaps:['Cap table verification against registry','Review of any side letters or undisclosed agreements','Regulatory licence review from BCEAO']},
    summary:{headline:'Sound legal structure — negotiate two provisions before signing',executive_summary:'The MicroLend shareholder agreement is professionally drafted and follows standard OHADA private equity conventions. Two provisions should be renegotiated: the 12-month founder lock-up (below market) and quarterly information rights (should be monthly).',key_highlights:['Standard OHADA documentation','Strong drag-along exit provisions','Good IP ownership clarity','Reasonable representations and warranties'],key_concerns:['12-month founder lock-up too short','Quarterly information rights insufficient','No performance ratchet mechanism'],next_steps:['Negotiate founder lock-up to 24 months','Upgrade information rights to monthly','Verify cap table at RCCM registry']}
  },
  doc5:{
    classification:{document_type:'financial_model',confidence:.89,company_name:'GreenPower SN',period:'2024-2030',data_quality:'medium',summary:'5-year financial projections for GreenPower Senegal solar development pipeline. Management case only — no downside or upside scenarios modelled.',key_topics:['Solar Pipeline','IRR','EBITDA','Project Finance']},
    financial:{period:'FY2024-2030',currency:'USD',income_statement:{revenue:3200000,ebitda:2240000,net_income:1150000},ratios:{ebitda_margin_pct:70,revenue_growth_pct:85},historical_data:[{year:'2024',revenue:1200000,ebitda:840000},{year:'2025',revenue:2100000,ebitda:1470000},{year:'2026',revenue:3200000,ebitda:2240000},{year:'2027',revenue:4800000,ebitda:3360000},{year:'2028',revenue:7200000,ebitda:5040000}],red_flags:['Single management case only — no sensitivity analysis','Revenue ramp assumes all 40MW pipeline reaches construction','No provision for cost overruns or delays']},
    risk:{overall_risk_score:6,overall_risk_level:'high',investment_recommendation:'further_diligence_required',summary:'GreenPower presents high execution risk due to the early-stage nature of the pipeline. Financial projections appear optimistic and rely entirely on management assumptions. Independent technical due diligence required before investment.',risk_flags:[{severity:'high',category:'financial',title:'Single management case — no downside scenario',detail:'Model presents one scenario only. Industry standard requires base, downside and upside cases.',mitigation:'Request independent financial model with three scenarios. Stress test key assumptions.'},{severity:'high',category:'operational',title:'40MW pipeline execution risk',detail:'Revenue projections assume 100% of pipeline reaches completion. Typical attrition rate is 40-60% for early-stage solar.',mitigation:'Conduct independent technical assessment. Invest in tranches tied to MW commissioned.'},{severity:'medium',category:'commercial',title:'PPA counterparty concentration',detail:'Single PPA with SENELEC represents 100% of projected revenue.',mitigation:'Verify SENELEC creditworthiness. Consider offtake diversification before full deployment.'}],strengths:['70% EBITDA margins typical for solar','Strong renewable energy policy in Senegal','Experienced management team'],diligence_gaps:['Independent technical assessment of pipeline','PPA term and bankability review','Land rights verification for all sites']},
    summary:{headline:'Attractive sector but execution risk requires staged investment approach',executive_summary:'GreenPower Senegal operates in an attractive renewable energy market with supportive government policy. However, the financial projections are based on optimistic management assumptions and execution risk is high for a 40MW early-stage pipeline. Recommend staged investment structure tied to milestones.',key_highlights:['Attractive market — Senegal renewable energy target 30% by 2030','70% EBITDA margins at steady state','Strong management team with 15 years experience'],key_concerns:['No downside scenario in financial model','40MW pipeline execution risk','Single PPA counterparty (SENELEC)'],next_steps:['Commission independent technical advisor','Request three-scenario financial model','Review PPA terms and SENELEC credit rating']}
  }
};

let state={doc:'doc1',tab:'classification',chart:null};
const STATUS_COLOR={uploaded:'#5a6787',queued:'#f59e0b',processing:'#4a7cff',complete:'#22d3a0',failed:'#f43f5e'};

function toast(msg){
  const t=document.getElementById('toasts');
  const d=document.createElement('div');
  d.className='toast';d.textContent=msg;
  t.appendChild(d);setTimeout(()=>d.remove(),3500);
}

function tag(label,c='#4a7cff'){
  return `<span class="tag" style="background:${c}18;color:${c};border:1px solid ${c}44">${label}</span>`;
}

function render(){
  document.getElementById('app').innerHTML=`
    <header>
      <div>
        <div class="h-logo">DD Engine</div>
        <div class="h-sub">Automated Due Diligence · Initiative 06 · Demo</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <span style="font-size:11px;color:var(--muted)">${docs.length} documents · ${docs.filter(d=>d.status==='complete').length} analysed</span>
      </div>
    </header>
    <div class="body">
      <div class="left-panel">
        ${renderUploadZone()}
        <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">Documents (${docs.length})</div>
        ${docs.map(d=>`
          <div class="doc-row ${state.doc===d.id?'active':''}" onclick="selectDoc('${d.id}')">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
              <div style="min-width:0">
                <div style="font-weight:600;font-size:12px;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.title}</div>
                <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap">
                  ${tag(TYPE_LBL[d.doc_type],'#4a7cff')}
                  <span class="tag" style="background:${STATUS_COLOR[d.status]}18;color:${STATUS_COLOR[d.status]};border:1px solid ${STATUS_COLOR[d.status]}44">${d.status}</span>
                </div>
                <div style="font-size:10px;color:var(--muted);margin-top:4px">${d.company_name} · ${d.pages}p · ${d.size}</div>
              </div>
            </div>
            ${d.status==='queued'?`
              <div style="display:flex;gap:5px;margin-top:8px">
                <button class="btn-p" style="font-size:11px;padding:5px 10px" onclick="event.stopPropagation();runAnalysis('${d.id}','full')">▶ Full Analysis</button>
                <select style="font-size:11px;padding:4px 7px;width:auto;margin-bottom:0" onchange="event.stopPropagation();runAnalysis('${d.id}',this.value);this.value=''">
                  <option value="">Specific...</option>
                  <option value="classification">Classify</option>
                  <option value="financial">Financial</option>
                  <option value="legal">Legal</option>
                  <option value="risk">Risk</option>
                </select>
              </div>`:''}
          </div>`).join('')}
      </div>
      <div class="right-panel fu" id="right-panel">
        ${renderRight()}
      </div>
    </div>`;
  afterRender();
}

function renderUploadZone(){
  return `
    <div class="upload-zone" onclick="simulateUpload()" id="upload-zone"
      ondragover="event.preventDefault();this.classList.add('drag')"
      ondragleave="this.classList.remove('drag')"
      ondrop="event.preventDefault();this.classList.remove('drag');simulateUpload()">
      <div style="font-size:24px;margin-bottom:8px">📄</div>
      <div style="font-size:13px;font-weight:600;margin-bottom:3px">Drop document or click to upload</div>
      <div style="font-size:11px;color:var(--muted)">PDF · DOCX · XLSX · TXT · Max 50MB</div>
    </div>`;
}

function renderRight(){
  const doc=docs.find(d=>d.id===state.doc);
  if(!doc) return '<div style="color:var(--muted);padding:40px;text-align:center">Select a document</div>';
  const a=analyses[state.doc];
  if(!a) return `
    <div style="text-align:center;padding:48px;color:var(--muted)">
      <div style="font-size:36px;margin-bottom:12px">⏳</div>
      <div style="font-size:14px;font-weight:600;margin-bottom:6px">Ready for analysis</div>
      <div style="font-size:13px">Click "Full Analysis" to run all analysis types</div>
    </div>`;

  const tabs=Object.keys(a);
  const tab=state.tab&&a[state.tab]?state.tab:tabs[0];

  return `
    <div style="margin-bottom:16px">
      <h2 style="font-size:18px;font-weight:700;margin-bottom:4px">${doc.title}</h2>
      <div style="display:flex;gap:7px;align-items:center">
        ${tag(TYPE_LBL[doc.doc_type],'#4a7cff')}
        ${tag('complete','#22d3a0')}
        <span style="font-size:11px;color:var(--muted)">${doc.company_name} · ${doc.pages} pages</span>
      </div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px">
      ${tabs.map(t=>`
        <button class="a-tab ${tab===t?'active':''}" onclick="setAnalysisTab('${t}')">
          ${{classification:'🏷',financial:'💰',legal:'⚖️',risk:'⚠️',summary:'📋'}[t]||'•'} ${t}
        </button>`).join('')}
    </div>
    <div class="fu" id="analysis-content">
      ${renderAnalysis(a,tab)}
    </div>`;
}

function renderAnalysis(a,tab){
  const d=a[tab];
  if(!d) return '';
  if(tab==='classification') return renderClassification(d);
  if(tab==='financial')      return renderFinancial(d);
  if(tab==='legal')          return renderLegal(d);
  if(tab==='risk')           return renderRisk(d);
  if(tab==='summary')        return renderSummary(d);
  return '';
}

function renderClassification(d){
  return `
    <div class="s-card">
      <div class="s-title">Document classification</div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px">
        <div><div class="lbl">Type</div>${tag(d.document_type,'#4a7cff')}</div>
        <div><div class="lbl">Confidence</div><span style="font-family:var(--ffm);color:var(--blue)">${(d.confidence*100).toFixed(0)}%</span></div>
        <div><div class="lbl">Company</div><span style="font-weight:600">${d.company_name}</span></div>
        <div><div class="lbl">Period</div><span>${d.period}</span></div>
        <div><div class="lbl">Data Quality</div>${tag(d.data_quality,d.data_quality==='high'?'#22d3a0':d.data_quality==='medium'?'#f59e0b':'#f43f5e')}</div>
      </div>
      <p style="font-size:13px;color:var(--muted);line-height:1.75;margin-bottom:12px">${d.summary}</p>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${d.key_topics.map(t=>tag(t,'#a78bfa')).join('')}
      </div>
    </div>`;
}

function renderFinancial(d){
  const is_=d.income_statement||{};
  const rat=d.ratios||{};
  const hist=d.historical_data||[];
  return `
    <div class="s-card">
      <div class="s-title">Financial metrics — ${d.period} · ${d.currency}</div>
      <div class="m-grid">
        ${[['Revenue',is_.revenue],['EBITDA',is_.ebitda],['Net Income',is_.net_income],['Total Debt',(d.balance_sheet||{}).total_debt]].map(([l,v])=>`
          <div class="m-box"><div class="m-lbl">${l}</div>
            <div class="m-val" style="font-size:16px;color:var(--text)">${v?'$'+Number(v).toLocaleString():'—'}</div>
          </div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">
        ${[['EBITDA Margin',rat.ebitda_margin_pct,'%'],['Net Margin',rat.net_margin_pct,'%'],['Rev Growth',rat.revenue_growth_pct,'%'],['D/E Ratio',rat.debt_to_equity,'x'],['Current Ratio',rat.current_ratio,'x']].map(([l,v,u])=>`
          <div style="padding:7px 0;border-bottom:1px solid var(--border)">
            <div style="font-size:10px;color:var(--muted);margin-bottom:2px">${l}</div>
            <div style="font-family:var(--ffm);font-weight:600">${v!=null?v+u:'—'}</div>
          </div>`).join('')}
      </div>
      ${hist.length>1?`
        <div class="lbl">Revenue / EBITDA History</div>
        <canvas id="fin-chart" height="130"></canvas>`:'' }
    </div>
    ${d.red_flags&&d.red_flags.length?`
      <div class="s-card" style="border-left:3px solid var(--red);border-radius:0 var(--rl) var(--rl) 0">
        <div class="s-title">Financial red flags</div>
        ${d.red_flags.map(f=>`<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--red)"><span>⚠</span>${f}</div>`).join('')}
      </div>`:''}`;
}

function renderLegal(d){
  const kt=d.key_terms||{};
  return `
    <div class="s-card">
      <div class="s-title">Legal analysis — ${d.document_type}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
        ${d.parties.map(p=>tag(p,'#4a7cff')).join('')}
        ${d.governing_law?tag(d.governing_law,'#6b7599'):''}
        ${d.effective_date?`<span style="font-size:12px;color:var(--muted)">Effective: ${d.effective_date}</span>`:''}
      </div>
      ${Object.entries(kt).filter(([,v])=>v&&(typeof v==='string'||Array.isArray(v))).map(([k,v])=>`
        <div style="padding:7px 0;border-bottom:1px solid var(--border)">
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px">${k.replace(/_/g,' ')}</div>
          <div style="font-size:12px;line-height:1.65">${Array.isArray(v)?v.join(' · '):v}</div>
        </div>`).join('')}
      <div style="margin-top:12px"><div class="lbl">Analyst notes</div>
        <p style="font-size:13px;color:var(--muted);line-height:1.75">${d.analyst_notes}</p>
      </div>
    </div>
    ${d.risk_provisions&&d.risk_provisions.length?`
      <div class="s-card" style="border-left:3px solid var(--amber);border-radius:0 var(--rl) var(--rl) 0">
        <div class="s-title">Risk provisions</div>
        ${d.risk_provisions.map(p=>`<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--amber)"><span>△</span>${p}</div>`).join('')}
      </div>`:''}`;
}

function renderRisk(d){
  const sc=d.overall_risk_score||0;
  const scoreColor=sc>=8?'#f43f5e':sc>=6?'#f59e0b':sc>=4?'#fbbf24':'#22d3a0';
  return `
    <div class="s-card">
      <div class="s-title">Risk assessment</div>
      <div style="display:flex;gap:24px;align-items:center;margin-bottom:18px">
        <div style="text-align:center">
          <div style="font-family:var(--ffm);font-size:52px;font-weight:700;color:${scoreColor};line-height:1">${sc}</div>
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:4px">Risk Score /10</div>
        </div>
        <div>
          <div class="lbl">Overall</div>${tag(d.overall_risk_level,scoreColor)}
          <div class="lbl" style="margin-top:10px">Recommendation</div>
          ${tag((d.investment_recommendation||'').replace(/_/g,' '),d.investment_recommendation==='proceed'?'#22d3a0':d.investment_recommendation?.includes('not')?'#f43f5e':'#f59e0b')}
        </div>
        <p style="font-size:13px;color:var(--muted);line-height:1.75;flex:1">${d.summary}</p>
      </div>
      ${(d.risk_flags||[]).map(f=>`
        <div class="flag" style="background:${SEV_BG[f.severity]};border-left-color:${SEV_COLOR[f.severity]}">
          <div class="f-hdr">
            ${tag(f.severity,SEV_COLOR[f.severity])}
            ${tag(f.category,'#6b7599')}
            <strong style="font-size:13px">${f.title}</strong>
          </div>
          <p>${f.detail}</p>
          ${f.mitigation?`<div class="mitigation">Mitigation: ${f.mitigation}</div>`:''}
        </div>`).join('')}
    </div>
    ${d.strengths&&d.strengths.length?`
      <div class="s-card">
        <div class="s-title">Strengths</div>
        ${d.strengths.map(s=>`<div style="display:flex;gap:8px;padding:4px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--green)"><span>✓</span>${s}</div>`).join('')}
      </div>`:''}
    ${d.diligence_gaps&&d.diligence_gaps.length?`
      <div class="s-card">
        <div class="s-title">Diligence gaps</div>
        ${d.diligence_gaps.map(g=>`<div style="display:flex;gap:8px;padding:4px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--amber)"><span>△</span>${g}</div>`).join('')}
      </div>`:''}`;
}

function renderSummary(d){
  return `
    <div class="s-card">
      <div class="s-title">Executive summary</div>
      <h3 style="font-size:16px;font-weight:700;margin-bottom:12px;line-height:1.4">${d.headline}</h3>
      <p style="font-size:13px;color:var(--muted);line-height:1.8;margin-bottom:16px">${d.executive_summary}</p>
      ${d.key_highlights&&d.key_highlights.length?`
        <div class="lbl">Key highlights</div>
        ${d.key_highlights.map(h=>`<div style="display:flex;gap:8px;padding:4px 0;border-bottom:1px solid var(--border);font-size:12px"><span style="color:var(--blue)">●</span>${h}</div>`).join('')}`:''}
    </div>
    ${d.key_concerns&&d.key_concerns.length?`
      <div class="s-card" style="border-left:3px solid var(--amber);border-radius:0 var(--rl) var(--rl) 0">
        <div class="s-title">Key concerns</div>
        ${d.key_concerns.map(c=>`<div style="display:flex;gap:8px;padding:4px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--amber)"><span>▲</span>${c}</div>`).join('')}
      </div>`:''}
    ${d.next_steps&&d.next_steps.length?`
      <div class="s-card">
        <div class="s-title">Recommended next steps</div>
        ${d.next_steps.map((s,i)=>`<div style="display:flex;gap:8px;padding:4px 0;border-bottom:1px solid var(--border);font-size:12px"><span style="color:var(--green)">${i+1}.</span>${s}</div>`).join('')}
      </div>`:''}`;
}

function afterRender(){
  const ctx=document.getElementById('fin-chart');
  if(ctx){
    if(state.chart) state.chart.destroy();
    const a=analyses[state.doc];
    const hist=a?.financial?.historical_data||[];
    state.chart=new Chart(ctx,{type:'bar',data:{
      labels:hist.map(h=>h.year),
      datasets:[
        {label:'Revenue',data:hist.map(h=>h.revenue),backgroundColor:'#4a7cff',borderRadius:3},
        {label:'EBITDA',data:hist.map(h=>h.ebitda),backgroundColor:'#22d3a0',borderRadius:3},
      ]
    },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#5a6787',font:{size:11},boxWidth:8}}},
      scales:{x:{grid:{display:false},ticks:{color:'#5a6787',font:{size:11}}},
              y:{grid:{color:'#1c2438'},ticks:{color:'#5a6787',font:{size:11},callback:v=>'$'+Math.round(v/1000)+'k'}}}}});
  }
}

window.selectDoc=id=>{state.doc=id;state.tab='classification';render()};
window.setAnalysisTab=t=>{state.tab=t;const el=document.getElementById('right-panel');if(el){el.innerHTML=renderRight();afterRender();}};

window.simulateUpload=()=>{
  const titles=['Startup XYZ — Pitch Deck','New Acquisition — Term Sheet','Q3 Management Accounts'];
  const t=titles[Math.floor(Math.random()*titles.length)];
  const newDoc={id:'doc'+Date.now(),title:t,doc_type:'other',company_name:'Demo Corp',deal_name:'Demo Deal',status:'queued',pages:Math.floor(Math.random()*40)+8,size:(Math.random()*5+0.5).toFixed(1)+' MB',uploaded:new Date().toISOString().slice(0,10)};
  docs.unshift(newDoc);
  toast('Document uploaded: '+t+' — click "Full Analysis" to analyse');
  render();
};

window.runAnalysis=async(docId,type)=>{
  const doc=docs.find(d=>d.id===docId);
  if(!doc) return;
  doc.status='processing';
  render();
  toast(`Running ${type} analysis on ${doc.title.slice(0,30)}...`);
  await new Promise(r=>setTimeout(r,1800));
  doc.status='complete';
  toast('Analysis complete! ✓');
  state.doc=docId;state.tab='classification';
  if(!analyses[docId]){
    analyses[docId]={
      classification:{document_type:'pitch_deck',confidence:.82,company_name:'Demo Corp',period:'2024',data_quality:'medium',summary:'Pitch deck presenting investment opportunity. Contains business overview, market analysis and financial projections.',key_topics:['Market Opportunity','Team','Financials','Growth Strategy']},
      risk:{overall_risk_score:5,overall_risk_level:'medium',investment_recommendation:'proceed_with_caution',summary:'Standard early-stage risk profile. Further diligence required on financial projections and team background.',risk_flags:[{severity:'medium',category:'financial',title:'Financial projections unaudited',detail:'Management projections only with no independent verification.',mitigation:'Request audited or reviewed financials.'},{severity:'low',category:'management',title:'Team background checks pending',detail:'Management CVs provided but background verification not yet complete.',mitigation:'Commission standard background checks before investment.'}],strengths:['Clear market positioning','Experienced management team'],diligence_gaps:['Audited financials','Reference checks','Customer interviews']},
      summary:{headline:'Promising opportunity — standard early-stage diligence required',executive_summary:'Demo Corp presents a compelling market opportunity with an experienced team. Financial projections appear reasonable but require independent validation. Recommend standard early-stage due diligence process.',key_highlights:['Strong market position','Experienced team'],key_concerns:['Unaudited financials','Early stage execution risk'],next_steps:['Request audited financials','Commission background checks','Customer reference calls']}
    };
  }
  render();
};

render();
</script>
</body>
</html>
