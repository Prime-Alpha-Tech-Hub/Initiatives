<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07090f;--surf:#0d1119;--surf2:#121722;--surf3:#171e2d;--border:#1a2238;--border2:#1f2d47;--blue:#4a7cff;--blue-d:rgba(74,124,255,.1);--blue-glow:rgba(74,124,255,.18);--green:#1fc98a;--red:#f04166;--amber:#f59e0b;--gold:#c9a84c;--purple:#a78bfa;--text:#dde4f5;--muted:#566382;--dim:#1c2540;--ff:'Figtree',system-ui,sans-serif;--ffm:'DM Mono',monospace;--ffd:'Fraunces',serif;--r:6px;--rl:10px;}
html,body{height:100%;font-family:var(--ff);background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
input,select,textarea{font-family:var(--ff);color:var(--text);background:var(--surf2);border:1px solid var(--border);border-radius:var(--r);padding:9px 12px;outline:none;width:100%;font-size:13px;transition:border .12s,box-shadow .12s}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}

.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

.section-label{font-family:var(--ffm);font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:16px}
.fg{display:grid;gap:14px;margin-bottom:14px}
.fg2{grid-template-columns:1fr 1fr}

@media(max-width:580px){.fg2,.fg3{grid-template-columns:1fr}}
.fi{display:flex;flex-direction:column;gap:5px}
.fi label{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted)}
.hint{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.5}
.divider{height:1px;background:var(--border);margin:16px 0}
.ebitda-warn{display:none;margin-top:6px;padding:10px 12px;border-radius:var(--r);background:rgba(240,65,102,.08);border:1px solid rgba(240,65,102,.25);font-size:11px;color:var(--red);line-height:1.6}
.bor-tabs{display:flex;gap:10px;margin-bottom:16px}
.bor-tab{flex:1;padding:11px 12px;text-align:center;border-radius:var(--r);border:1.5px solid var(--border);cursor:pointer;background:var(--surf2);transition:all .12s}
.bor-tab.active{border-color:var(--blue);background:rgba(74,124,255,.1)}
.bor-tab-name{font-size:12px;font-weight:700;color:var(--text)}
.bor-tab.active .bor-tab-name{color:var(--blue)}

.form-actions{display:flex;align-items:center;gap:10px;padding-top:18px;margin-top:4px;border-top:1px solid var(--border)}
.btn-primary{background:var(--blue);color:#fff;padding:9px 20px;border-radius:var(--r);font-size:12px;font-weight:700;border:none;cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:7px}
.btn-primary:hover{background:#3a6ff0;transform:translateY(-1px);box-shadow:0 4px 16px rgba(74,124,255,.3)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.btn-ghost{background:var(--surf2);color:var(--muted);border:1px solid var(--border);padding:8px 16px;border-radius:var(--r);font-size:12px;cursor:pointer;transition:all .12s}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.sp{width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
.back-row{display:flex;align-items:center;gap:8px;margin-bottom:20px}
.back-btn{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);cursor:pointer;padding:5px 10px;border-radius:var(--r);border:1px solid var(--border);background:var(--surf2);transition:all .12s}
.back-btn:hover{border-color:var(--border2);color:var(--text)}
.venture-badge{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:5px 12px;border-radius:var(--r);border:1.5px solid var(--vc-color,var(--border));background:var(--vc-bg,var(--surf2))}
.file-zone{display:flex;align-items:center;gap:8px;padding:10px 12px;border:1px dashed var(--border);border-radius:var(--r);background:var(--surf2);cursor:pointer;font-size:12px;color:var(--muted);transition:all .12s;margin-top:14px}
.file-zone:hover{border-color:var(--blue);color:var(--text)}
.file-zone.attached{border-color:var(--green);color:var(--green)}
.success-box{text-align:center;padding:52px 24px}
.success-icon{width:56px;height:56px;border-radius:50%;background:rgba(31,201,138,.12);border:2px solid var(--green);display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 18px;color:var(--green)}
.success-title{font-family:var(--ffd);font-size:22px;font-weight:600;margin-bottom:8px}
.success-sub{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:24px}
.success-key{font-family:var(--ffm);font-size:11px;color:var(--green);background:rgba(31,201,138,.08);border:1px solid rgba(31,201,138,.2);padding:6px 12px;border-radius:var(--r);display:inline-block;margin-bottom:24px;word-break:break-all}

<body>
<div class="app">
<div id="nav-placeholder"></div>
<div class="main"><div class="inner" id="main-area"></div></div>
<div class="pg-footer"><span>Prime Alpha Securities</span> &nbsp;·&nbsp; Alternative Investment Fund Manager &nbsp;·&nbsp; African Markets &nbsp;·&nbsp; Confidential</div>
</div>
<div class="toast-wrap" id="toasts"></div>
<script>
// ── local-engine.js (inlined) ──────────────────────────────
/**
 * DD Engine — Local Analysis Engine
 * Prime Alpha Securities
 *
 * Runs entirely offline. No API calls. No paid services.
 * Reads document text and form data, applies investment analysis rules,
 * returns structured JSON in the same format as the Claude API version.
 *
 * Include this script in all three HTML pages.
 */

window.LocalEngine = (function() {

  // ── Text extraction from uploaded file ──────────────────────────────────────
  async function extractText(file) {
    /**
     * Extracts plain text from a file for analysis.
     * PDF: uses pdf.js (loaded from CDN — free, open source).
     * DOCX/TXT/CSV: reads as text directly.
     * Returns { text: string, pageCount: number, extracted: boolean }
     */
    const ext = (file.name || '').split('.').pop().toLowerCase();

    // Plain text files
    if (['txt', 'csv', 'md'].includes(ext)) {
      const text = await readAsText(file);
      return { text, pageCount: 1, extracted: true };
    }

    // DOCX — read raw XML text (good enough for keyword analysis)
    if (['docx', 'doc'].includes(ext)) {
      try {
        const arrayBuffer = await readAsArrayBuffer(file);
        // DOCX is a ZIP — try to extract word/document.xml text
        // Without JSZip we can still extract visible strings
        const text = extractStringsFromBinary(arrayBuffer);
        return { text, pageCount: 1, extracted: true };
      } catch {
        return { text: '', pageCount: 0, extracted: false };
      }
    }

    // PDF — use pdf.js if available
    if (ext === 'pdf') {
      if (window.pdfjsLib) {
        try {
          const arrayBuffer = await readAsArrayBuffer(file);
          const pdf   = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
          let   text  = '';
          for (let i = 1; i <= Math.min(pdf.numPages, 40); i++) {
            const page    = await pdf.getPage(i);
            const content = await page.getTextContent();
            text += content.items.map(s => s.str).join(' ') + '\n';
          }
          return { text, pageCount: pdf.numPages, extracted: true };
        } catch (e) {
          console.warn('[LocalEngine] PDF.js error:', e.message);
        }
      }
      // Fallback: extract printable ASCII strings from binary
      const ab   = await readAsArrayBuffer(file);
      const text = extractStringsFromBinary(ab);
      return { text, pageCount: 1, extracted: text.length > 100 };
    }

    return { text: '', pageCount: 0, extracted: false };
  }

  function readAsText(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload  = e => res(e.target.result);
      r.onerror = rej;
      r.readAsText(file);
    });
  }

  function readAsArrayBuffer(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload  = e => res(e.target.result);
      r.onerror = rej;
      r.readAsArrayBuffer(file);
    });
  }

  function extractStringsFromBinary(arrayBuffer) {
    const bytes = new Uint8Array(arrayBuffer);
    let str = '', result = '';
    for (let i = 0; i < bytes.length; i++) {
      const c = bytes[i];
      if (c >= 32 && c < 127) {
        str += String.fromCharCode(c);
      } else {
        if (str.length >= 5) result += str + ' ';
        str = '';
      }
    }
    return result.slice(0, 50000); // cap at 50KB
  }

  // ── Keyword extraction helpers ───────────────────────────────────────────────
  function extractNumber(text, patterns) {
    for (const p of patterns) {
      const m = text.match(p);
      if (m) {
        const raw = m[1].replace(/[,$]/g, '');
        return parseFloat(raw) || null;
      }
    }
    return null;
  }

  function findKeywords(text, keywords) {
    const lc = text.toLowerCase();
    return keywords.filter(k => lc.includes(k.toLowerCase()));
  }

  function countKeywords(text, keywords) {
    return findKeywords(text, keywords).length;
  }

  // ── Document classification ──────────────────────────────────────────────────
  function classifyDocument(text, fileName, meta) {
    const lc   = text.toLowerCase();
    const name = (fileName || '').toLowerCase();

    // Detect document type by keywords
    const typeMap = [
      { type: 'audit_report',       keywords: ['audited financial', 'audit opinion', 'kpmg', 'pwc', 'deloitte', 'ernst & young', 'independent auditor'] },
      { type: 'financial_model',    keywords: ['projected revenue', 'ebitda margin', 'financial projections', 'forecast', 'irr', 'npv', 'dcf'] },
      { type: 'term_sheet',         keywords: ['term sheet', 'conditions precedent', 'representations and warranties', 'closing date', 'long stop'] },
      { type: 'legal_contract',     keywords: ['shareholder agreement', 'subscription agreement', 'shareholders deed', 'articles of association', 'memorandum'] },
      { type: 'cim',                keywords: ['confidential information memorandum', 'investment highlights', 'management team', 'market opportunity', 'executive summary'] },
      { type: 'pitch_deck',         keywords: ['series a', 'series b', 'seed round', 'runway', 'traction', 'market size', 'total addressable market'] },
      { type: 'warehouse_receipt',  keywords: ['warehouse receipt', 'afex', 'ecx', 'gcx', 'grade a', 'moisture content', 'metric tonnes'] },
      { type: 'valuation_report',   keywords: ['independent valuation', 'market value', 'capitalisation rate', 'discounted cash flow', 'comparable transactions'] },
    ];

    let best = 'other', bestScore = 0;
    for (const { type, keywords } of typeMap) {
      const score = countKeywords(lc, keywords);
      if (score > bestScore) { bestScore = score; best = type; }
    }

    const confidence = Math.min(0.5 + bestScore * 0.12, 0.97);

    // Extract company name from text
    const coPatterns = [
      /(?:company|corporation|ltd|limited|sarl|sa|plc|inc|llc)[:\s]+([A-Z][A-Za-z\s&.,]+)/,
      /([A-Z][A-Za-z\s&]+(?:Ltd|Limited|SARL|SA|Plc|Inc|LLC))/,
    ];
    let company = meta?.company_name || '';
    if (!company) {
      for (const p of coPatterns) {
        const m = text.match(p);
        if (m) { company = m[1].trim().slice(0, 60); break; }
      }
    }

    // Extract period
    const yearMatch = text.match(/\b(20[12][0-9])\b/g);
    const period    = yearMatch ? yearMatch[yearMatch.length - 1] : '2024';

    // Data quality
    const dataQuality = bestScore >= 3 ? 'high' : bestScore >= 1 ? 'medium' : 'low';

    // Key topics
    const topicKeywords = [
      'Revenue', 'EBITDA', 'IRR', 'MOIC', 'Valuation', 'Collateral',
      'Governance', 'ESG', 'Debt', 'Equity', 'Exit', 'Covenant',
      'FX', 'Currency', 'Regulatory', 'Compliance', 'KYC', 'AML',
    ];
    const topics = topicKeywords.filter(t => lc.includes(t.toLowerCase())).slice(0, 5);

    // Summary
    const firstSentences = text.replace(/\s+/g, ' ').slice(0, 400).trim();

    return {
      document_type: best,
      confidence: Math.round(confidence * 100) / 100,
      company_name: company || 'Unknown',
      period,
      data_quality: dataQuality,
      summary: firstSentences ? `${firstSentences}…` : `${best.replace(/_/g,' ')} document analysed.`,
      key_topics: topics.length ? topics : ['Investment Analysis'],
    };
  }

  // ── Financial analysis ───────────────────────────────────────────────────────
  function analyseFinancials(text, meta) {
    const lc = text.toLowerCase();

    const revenue = extractNumber(text, [
      /revenue[:\s]+\$?([\d,]+(?:\.\d+)?)\s*(?:million|m\b)?/i,
      /turnover[:\s]+\$?([\d,]+(?:\.\d+)?)/i,
      /total\s+revenue[:\s]+\$?([\d,]+(?:\.\d+)?)/i,
    ]);

    const ebitda = extractNumber(text, [
      /ebitda[:\s]+\$?([\d,]+(?:\.\d+)?)/i,
      /operating\s+profit[:\s]+\$?([\d,]+(?:\.\d+)?)/i,
    ]);

    const netIncome = extractNumber(text, [
      /net\s+(?:income|profit)[:\s]+\$?([\d,]+(?:\.\d+)?)/i,
      /profit\s+after\s+tax[:\s]+\$?([\d,]+(?:\.\d+)?)/i,
    ]);

    const debt = extractNumber(text, [
      /(?:total\s+)?debt[:\s]+\$?([\d,]+(?:\.\d+)?)/i,
      /borrowings[:\s]+\$?([\d,]+(?:\.\d+)?)/i,
    ]);

    // Calculate ratios
    const ebitdaMargin = (revenue && ebitda) ? Math.round(ebitda / revenue * 100) : null;
    const debtToEquity = (debt && revenue)   ? Math.round(debt / revenue * 10) / 10 : null;

    // Revenue growth from historical mentions
    const growthMatch = text.match(/(?:revenue\s+growth|grew|increased)[:\s]+(\d+(?:\.\d+)?)\s*%/i);
    const revenueGrowth = growthMatch ? parseFloat(growthMatch[1]) : null;

    // Red flags
    const redFlags = [];
    if (lc.includes('going concern'))    redFlags.push('Going concern note in audit opinion');
    if (lc.includes('material weakness')) redFlags.push('Material weakness in internal controls');
    if (lc.includes('restatement'))      redFlags.push('Financial restatement identified');
    if (lc.includes('qualified opinion')) redFlags.push('Qualified audit opinion');
    if (ebitdaMargin !== null && ebitdaMargin < 0) redFlags.push('Negative EBITDA margin');
    if (debtToEquity !== null && debtToEquity > 3)  redFlags.push('High leverage ratio: ' + debtToEquity + 'x');
    if (!revenue && !ebitda)              redFlags.push('No financial figures extracted — verify document quality');

    return {
      period: meta?.period || '2024',
      currency: lc.includes('ngn') || lc.includes('naira') ? 'NGN'
               : lc.includes('xaf') || lc.includes('fcfa') ? 'XAF'
               : lc.includes('kes') ? 'KES'
               : lc.includes('zar') ? 'ZAR'
               : 'USD',
      income_statement: {
        revenue:    revenue || null,
        ebitda:     ebitda  || null,
        net_income: netIncome || null,
      },
      ratios: {
        ebitda_margin_pct:  ebitdaMargin,
        revenue_growth_pct: revenueGrowth,
        debt_to_equity:     debtToEquity,
      },
      historical_data: [],
      red_flags: redFlags,
    };
  }

  // ── Legal analysis ───────────────────────────────────────────────────────────
  function analyseLegal(text, meta) {
    const lc = text.toLowerCase();

    const docType = lc.includes('shareholder') ? 'Shareholder Agreement'
                  : lc.includes('subscription') ? 'Subscription Agreement'
                  : lc.includes('term sheet')   ? 'Term Sheet'
                  : lc.includes('facility')     ? 'Facility Agreement'
                  : lc.includes('lease')        ? 'Lease Agreement'
                  : 'Legal Document';

    // Party extraction
    const parties = [];
    const partyMatch = text.match(/between[:\s]+([A-Z][A-Za-z\s,&.()]+?)(?:and|,)/i);
    if (partyMatch) parties.push(partyMatch[1].trim().slice(0, 80));
    if (lc.includes('prime alpha')) parties.push('Prime Alpha Securities');

    // Governing law
    const lawMatch = text.match(/governed\s+by[:\s]+(?:the\s+laws?\s+of\s+)?([A-Z][A-Za-z\s]+?)(?:\.|,|\n)/i);
    const governingLaw = lawMatch ? lawMatch[1].trim().slice(0, 60) : 'Not specified';

    // Risk provisions
    const riskProvisions = [];
    if (!lc.includes('drag-along') && !lc.includes('drag along'))
      riskProvisions.push('No drag-along provision identified');
    if (!lc.includes('tag-along') && !lc.includes('tag along'))
      riskProvisions.push('No tag-along provision identified');
    if (!lc.includes('non-compete') && !lc.includes('non compete'))
      riskProvisions.push('Non-compete clause not identified');
    if (!lc.includes('representations') && !lc.includes('warranties'))
      riskProvisions.push('Representations and warranties not found — verify document');

    return {
      document_type: docType,
      parties: parties.length ? parties : ['Counterparties not extracted'],
      governing_law: governingLaw,
      key_terms: {},
      risk_provisions: riskProvisions.length ? riskProvisions : ['No significant risk provisions flagged'],
      analyst_notes: `${docType} reviewed. ${parties.length ? parties.join(' and ') + ' identified as parties.' : ''} Standard due diligence review recommended.`,
    };
  }

  // ── Risk analysis ────────────────────────────────────────────────────────────
  function analyseRisk(text, meta, classification) {
    const lc = text.toLowerCase();

    // Count risk signals
    const highRiskSignals = findKeywords(lc, [
      'default', 'litigation', 'going concern', 'sanctions', 'fraud', 'corruption',
      'material weakness', 'qualified opinion', 'restatement', 'bankruptcy', 'insolvency',
      'criminal', 'money laundering', 'bribery',
    ]);

    const medRiskSignals = findKeywords(lc, [
      'concentration', 'key man', 'key-man', 'single customer', 'regulatory risk',
      'currency risk', 'fx risk', 'interest rate', 'refinancing', 'covenant breach',
      'competitive pressure', 'market risk', 'political risk', 'country risk',
    ]);

    const positiveSignals = findKeywords(lc, [
      'growth', 'profitable', 'market leader', 'diversified', 'long-term contract',
      'recurring revenue', 'audited', 'clean opinion', 'experienced management',
      'collateralised', 'secured', 'insurance', 'hedged',
    ]);

    const riskScore = Math.min(10, Math.max(1,
      3 + highRiskSignals.length * 2 + medRiskSignals.length - positiveSignals.length
    ));

    const riskLevel = riskScore <= 3 ? 'low'
                    : riskScore <= 5 ? 'medium'
                    : riskScore <= 7 ? 'high'
                    : 'critical';

    const recommendation = riskScore <= 3 ? 'proceed'
                         : riskScore <= 5 ? 'proceed_with_caution'
                         : riskScore <= 7 ? 'further_diligence_required'
                         : 'do_not_proceed';

    // Build risk flags
    const flags = [];
    if (highRiskSignals.length) {
      flags.push({
        severity: 'high',
        category: 'compliance',
        title: 'High-risk keywords detected',
        detail: `The following risk signals were identified in the document: ${highRiskSignals.slice(0,4).join(', ')}.`,
        mitigation: 'Request clarification and additional documentation on each flagged item.',
      });
    }
    if (medRiskSignals.length) {
      flags.push({
        severity: 'medium',
        category: 'market',
        title: 'Medium-risk factors identified',
        detail: `Risk factors noted: ${medRiskSignals.slice(0,3).join(', ')}.`,
        mitigation: 'Assess materiality and request management commentary.',
      });
    }
    if (!flags.length) {
      flags.push({
        severity: 'low',
        category: 'general',
        title: 'No critical risk flags identified',
        detail: 'Document text analysis did not surface critical risk keywords. Standard diligence applies.',
        mitigation: 'Proceed with standard investment committee review.',
      });
    }

    return {
      overall_risk_score:         riskScore,
      overall_risk_level:         riskLevel,
      investment_recommendation:  recommendation,
      summary: `Risk score ${riskScore}/10 (${riskLevel}). ${highRiskSignals.length} high-risk signal(s) and ${medRiskSignals.length} medium-risk factor(s) identified from document text analysis.`,
      risk_flags: flags,
      strengths: positiveSignals.slice(0, 4).map(s => s.charAt(0).toUpperCase() + s.slice(1)) || ['No specific strengths extracted'],
      diligence_gaps: [
        'Management accounts for most recent quarter',
        'Reference checks on key counterparties',
        'Independent legal review of key clauses',
      ],
    };
  }

  // ── Summary ──────────────────────────────────────────────────────────────────
  function buildSummary(classification, financials, risk) {
    const docType  = (classification?.document_type || 'document').replace(/_/g, ' ');
    const company  = classification?.company_name || 'the company';
    const rScore   = risk?.overall_risk_score || 5;
    const rLevel   = risk?.overall_risk_level  || 'medium';
    const rec      = risk?.investment_recommendation || 'further_diligence_required';

    const recLabel = {
      proceed:                    'Proceed — risk profile acceptable',
      proceed_with_caution:       'Proceed with caution — monitor key risks',
      further_diligence_required: 'Further diligence required before commitment',
      do_not_proceed:             'Do not proceed — unacceptable risk profile',
    }[rec] || rec;

    return {
      headline: `${company} — ${recLabel}`,
      executive_summary: `This ${docType} for ${company} has been reviewed. The overall risk score is ${rScore}/10 (${rLevel}). ${risk?.summary || ''} Standard investment committee review is recommended before any commitment.`,
      key_highlights: (risk?.strengths || []).slice(0, 3),
      key_concerns:   (risk?.risk_flags || []).slice(0, 3).map(f => f.title),
      next_steps: [
        'Present to Investment Committee for initial screening',
        'Commission independent legal review',
        'Request management accounts and projections',
        'Conduct reference calls with key counterparties',
      ],
    };
  }

  // ── Master analysis entry point ───────────────────────────────────────────────
  /**
   * analyseDocument(file, meta, type)
   * file: File object or null (for form-only analysis)
   * meta: { company_name, deal_name, doc_type, strategy }
   * type: 'full' | 'classification' | 'financial' | 'legal' | 'risk' | 'summary'
   * Returns the same JSON structure as the Claude API version.
   */
  async function analyseDocument(file, meta, type) {
    let text = '';
    let pageCount = 0;
    let extracted = false;

    if (file) {
      const r = await extractText(file);
      text      = r.text;
      pageCount = r.pageCount;
      extracted = r.extracted;
    }

    const classification = classifyDocument(text, file?.name, meta);
    const financials     = analyseFinancials(text, meta);
    const legal          = analyseLegal(text, meta);
    const risk           = analyseRisk(text, meta, classification);
    const summary        = buildSummary(classification, financials, risk);

    const full = { classification, financial: financials, legal, risk, summary };

    if (type === 'full')           return full;
    if (type === 'classification') return { classification };
    if (type === 'financial')      return { financial: financials };
    if (type === 'legal')          return { legal };
    if (type === 'risk')           return { risk };
    if (type === 'summary')        return { summary };
    return full;
  }

  /**
   * analyseForm(formData, strategy)
   * For intake forms — no document, pure form-data analysis.
   * Builds a text representation of the form and runs analysis.
   */
  async function analyseForm(formData, strategy) {
    // Convert form data to readable text for the analysis engine
    const lines = Object.entries(formData)
      .filter(([k, v]) => v && !['strategy','submittedAt','docName','docB64'].includes(k))
      .map(([k, v]) => `${k.replace(/_/g,' ')}: ${v}`);
    const text = lines.join('\n');

    const classification = {
      document_type: strategy + '_intake_form',
      confidence: 0.95,
      company_name: formData.co || formData.company || formData.commodity || 'Submitted Entity',
      period: new Date().getFullYear().toString(),
      data_quality: 'high',
      summary: `${strategy.toUpperCase()} deal intake form submitted by ${formData.name || 'analyst'}.`,
      key_topics: [strategy.toUpperCase(), 'Deal Intake', 'PAS Screening'],
    };

    const risk    = analyseRisk(text, formData, classification);
    const summary = buildSummary(classification, {}, risk);

    // For credit forms, apply the internal grading logic
    let creditGrade = null;
    if (strategy === 'credit') {
      creditGrade = gradeCreditRisk(formData);
      if (creditGrade) {
        risk.credit_grade     = creditGrade.grade;
        risk.pd_range         = creditGrade.pd_range;
        risk.suggested_rate   = creditGrade.rate;
        summary.headline      = `${classification.company_name} — Credit Grade ${creditGrade.grade} — ${creditGrade.rate_label}`;
      }
    }

    return { classification, risk, summary, credit_grade: creditGrade };
  }

  // ── Credit grading (mirrors the intake form credit engine) ───────────────────
  function gradeCreditRisk(d) {
    const rev    = parseFloat(d['cr-rev'] || d.rev || 0);
    const ebitda = parseFloat(d['cr-ebitda'] || d.ebitda || 0);
    const debt   = parseFloat(d['cr-debt'] || d.debt || 0);
    const ds     = parseFloat(d['cr-ds'] || d.ds || 0);
    const amount = parseFloat(d['cr-amount'] || d.amount || 0);

    if (!amount) return null;

    const dscr        = ds > 0 ? (ebitda / ds) : null;
    const ebitdaMargin = rev > 0 ? ebitda / rev : 0;
    const leverage    = rev > 0 ? debt / rev : 0;

    let score = 5; // start neutral
    if (dscr !== null) {
      if (dscr >= 2.5) score -= 2;
      else if (dscr >= 1.5) score -= 1;
      else if (dscr < 1.2) score += 2;
      else if (dscr < 1.0) score += 3;
    }
    if (ebitdaMargin > 0.20) score -= 1;
    if (ebitdaMargin < 0.05) score += 1;
    if (leverage > 2) score += 1;
    if (leverage > 4) score += 1;

    score = Math.max(1, Math.min(10, score));

    const GRADES = [
      { min:1, max:1, grade:'G1', pd:'1–2%',   rate: '12–14%', label:'Excellent — Prime rate' },
      { min:2, max:2, grade:'G2', pd:'2–4%',   rate: '14–16%', label:'Strong' },
      { min:3, max:3, grade:'G3', pd:'4–7%',   rate: '16–19%', label:'Good' },
      { min:4, max:4, grade:'G4', pd:'7–12%',  rate: '19–22%', label:'Acceptable' },
      { min:5, max:5, grade:'G5', pd:'12–18%', rate: '22–26%', label:'Borderline' },
      { min:6, max:6, grade:'G6', pd:'18–25%', rate: '26–32%', label:'Weak' },
      { min:7, max:7, grade:'G7', pd:'25–35%', rate: '32–38%', label:'Speculative' },
      { min:8, max:8, grade:'G8', pd:'35–50%', rate: '38–45%', label:'High risk' },
      { min:9, max:9, grade:'G9', pd:'50–70%', rate: '45–55%', label:'Very high risk' },
      { min:10,max:10,grade:'G10',pd:'70–100%',rate: '55%+',   label:'Extreme risk' },
    ];

    const g = GRADES.find(r => score >= r.min && score <= r.max) || GRADES[4];
    return {
      grade:      g.grade,
      pd_range:   g.pd,
      rate:       g.rate,
      rate_label: g.label,
      score,
      dscr:       dscr ? Math.round(dscr * 100) / 100 : null,
    };
  }

  // ── Public API ────────────────────────────────────────────────────────────────
  return { analyseDocument, analyseForm, extractText, gradeCreditRisk };

})();

(function() {

  if (old && !localStorage.getItem('dd_connection')) {
    try {

// ── Anthropic API ──────────────────────────────────────────────────────────────
async function getAnthropicKey() {
  if (window.ddEngine && window.ddEngine.getApiKey) {
    var k = await window.ddEngine.getApiKey();
    if (k) return k;
  }
  return DD_CONN.anthropicKey || '';
}

async function callAnthropic(messages, sys, maxTok) {
  var key = await getAnthropicKey();
  if (!key) throw new Error('No Anthropic API key — click Connect and enter your sk-ant-… key.');
  var resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: maxTok || 2500,
      system: sys || 'Return ONLY valid JSON. No markdown fences.',
      messages: messages
    })
  });
  if (!resp.ok) {
    var e = await resp.json().catch(function() { return {}; });
    throw new Error((e.error && e.error.message) || ('API error ' + resp.status));
  }
  var data = await resp.json();
  var text = (data.content || []).map(function(c) { return c.text || ''; }).join('');
  text = text.replace(/```json|```/g, '').trim();
  try { return JSON.parse(text); } catch(e) { return { raw: text, parse_error: true }; }
}

// ── Storage ────────────────────────────────────────────────────────────────────
var STORE_KEY = 'dd_reviews_v2';

async function saveReview(entry) {
  // Electron IPC
  if (window.ddEngine && window.ddEngine.saveReview) {
    try { await window.ddEngine.saveReview(entry); } catch(e) {}
  }
  // localStorage
  var all = getAllReviewsLocal();
  var idx = all.findIndex(function(r) { return r.key === entry.key; });
  if (idx !== -1) all[idx] = entry; else all.unshift(entry);
  try { localStorage.setItem(STORE_KEY, JSON.stringify(all)); } catch(e) {}
}

function getAllReviewsLocal() {
  var stored = [];
  try { stored = JSON.parse(localStorage.getItem(STORE_KEY) || '[]'); } catch(e) {}
  // Also scan legacy keys
  try {
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (k && (k.startsWith('PAS_DD_') || k.startsWith('pas_dd_'))) {
        try {
          var r = JSON.parse(localStorage.getItem(k));
          if (r && r.key && !stored.find(function(x) { return x.key === r.key; })) stored.push(r);
        } catch(e) {}
      }
    }
  } catch(e) {}
  return stored;
}

async function deleteReviewByKey(key) {
  if (window.ddEngine && window.ddEngine.deleteReview) {
    try { await window.ddEngine.deleteReview(key); } catch(e) {}
  }
  var all = getAllReviewsLocal().filter(function(r) { return r.key !== key; });
  try { localStorage.setItem(STORE_KEY, JSON.stringify(all)); } catch(e) {}
  try { localStorage.removeItem(key); } catch(e) {}
}

// ── File picker ────────────────────────────────────────────────────────────────
async function pickDoc() {
  if (window.ddEngine && window.ddEngine.pickFile) {
    var r = await window.ddEngine.pickFile();
    if (!r.ok) return;
    var fd = await window.ddEngine.readFile(r.filePath);
    if (!fd.ok) { toast('Cannot read file: ' + fd.error, '#f04166'); return; }
    DOC_FILE_NAME = fd.name; DOC_FILE_B64 = fd.data; DOC_FILE_MIME = fd.mimeType;
  } else {
    var inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = '.pdf,.docx,.doc,.xlsx,.txt,.csv';
    inp.onchange = function(e) {
      var f = e.target.files[0]; if (!f) return;
      DOC_FILE_NAME = f.name; DOC_FILE_MIME = f.type || 'application/octet-stream';
      var reader = new FileReader();
      reader.onload = function(ev) {
        DOC_FILE_B64 = ev.target.result.split(',')[1];
        updateFileZone();
      };
      reader.readAsDataURL(f);
    };
    inp.click(); return;
  }
  updateFileZone();
}

function updateFileZone() {
  var z = document.getElementById('file-zone'); if (!z) return;
  z.className = 'file-zone' + (DOC_FILE_NAME ? ' attached' : '');
  z.innerHTML = '📎 <span>' + (DOC_FILE_NAME ? DOC_FILE_NAME : 'Attach financial document — PDF, DOCX, XLSX, TXT (optional)') + '</span>';
}

// ── Collect form data ──────────────────────────────────────────────────────────
function GD() {
  var base = { strategy:CS, name:gv('f-name'), email:gv('f-email'), phone:gv('f-phone'), company:gv('f-company'), country:gv('f-country'), submittedAt:new Date().toISOString() };
  if (CS==='pe') return Object.assign({}, base, { co:gv('p-co'), sector:gv('p-sector'), geo:gv('p-geo'), stake:gn('p-stake'), size:gn('p-size'), rev:gn('p-rev'), ebitda:gn('p-ebitda'), debt:gn('p-debt'), revg:gn('p-revg'), irr:gn('p-irr'), holdingPeriod:gv('p-hold'), thesis:gv('p-thesis'), risks:gv('p-risks') });
  if (CS==='credit') {
    var bt=CB, amount=gn('cr-amount'), tenor=gn('cr-tenor')||1, secured=gv('cr-secured')==='secured';
    var br=BR(tenor), il=IP(tenor);
    var grd,PD,LGD,EL,str,req,cx,dscr=0,dti=0;
    if (bt==='business') {
      var eb=gn('cr-ebitda'), ds=gn('cr-ds');
      dscr = ds>0 ? eb/ds : 0;
      var lev = eb>0 ? gn('cr-debt')/eb : 99;
      grd = AG('business', {dscr:dscr, leverage:lev, sponsor:gv('cr-sponsor')});
    } else {
      var inc=gn('cr-income'), pmt=gn('cr-payments');
      dti = inc>0 ? (pmt/inc)*100 : 99;
      grd = AG('individual', {dti:dti, history:gv('cr-history')});
    }
    PD=(grd.pd[0]+grd.pd[1])/2/100; LGD=(grd.lgd[0]+grd.lgd[1])/2/100; EL=PD*LGD*100;
    cx=grd.g<=3?0.25:grd.g<=6?0.75:1.5; req=br+EL+il+cx+4.0; str=DS(secured,grd.g);
    return Object.assign({}, base, { bt:bt, amount:amount, tenor:tenor, secured:secured, collateral:gv('cr-collateral'), guarantees:gv('cr-guarantees'), purpose:gv('cr-purpose'), repay:gv('cr-repay'), rev:gn('cr-rev'), ebitda:gn('cr-ebitda'), debt:gn('cr-debt'), ds:gn('cr-ds'), sector:gv('cr-sector'), sponsor:gv('cr-sponsor'), income:gn('cr-income'), payments:gn('cr-payments'), employment:gv('cr-emp'), history:gv('cr-history'), years:gv('cr-years'), grd:grd, PD:PD, LGD:LGD, EL:EL, br:br, il:il, cx:cx, req:req, str:str, dscr:dscr, dti:dti });
  }
  if (CS==='commodities') return Object.assign({}, base, { commodity:gv('c-comm'), exchange:gv('c-exchange'), volume:gn('c-vol'), price:gn('c-price'), value:gn('c-value'), grade:gv('c-grade'), warehouse:gv('c-warehouse'), counterparty:gv('c-counter'), po:gv('c-po') });
  if (CS==='re') return Object.assign({}, base, { assetType:gv('r-type'), location:gv('r-loc'), acqPrice:gn('r-price'), valuation:gn('r-val'), area:gn('r-area'), occupancy:gn('r-occ'), rental:gn('r-rent'), irr:gn('r-irr'), title:gv('r-title'), thesis:gv('r-thesis') });
}

// ── Build prompt ───────────────────────────────────────────────────────────────
function buildPrompt(d) {
  var s = d.strategy;
  var body = '';
  if (s==='pe') body = 'PRIVATE EQUITY\nTarget company: '+d.co+'\nSector: '+d.sector+' | Geography: '+d.geo+'\nEquity stake: '+d.stake+'% | Deal size: $'+d.size+'\nRevenue FY: $'+d.rev+' | EBITDA: $'+d.ebitda+' | Total debt: $'+d.debt+'\nRevenue growth: '+d.revg+'% | Target IRR: '+d.irr+'% | Holding: '+d.holdingPeriod+'\nThesis: '+d.thesis+'\nKey risks: '+d.risks;
  else if (s==='credit') body = 'PRIVATE CREDIT\nBorrower: '+d.bt+' | Amount: $'+d.amount+' | Tenor: '+d.tenor+'yr\nCollateral: '+(d.secured?'Secured':'Unsecured')+' — '+d.collateral+' | Guarantees: '+d.guarantees+'\nPurpose: '+d.purpose+' | Repayment: '+d.repay+'\n'+(d.bt==='business'?'Revenue: $'+d.rev+' | EBITDA: $'+d.ebitda+' | DSCR: '+d.dscr.toFixed(2)+'\nSector: '+d.sector+' | Sponsor: '+d.sponsor:'Income: $'+d.income+' | DTI: '+d.dti.toFixed(1)+'%\nEmployment: '+d.employment+' | Credit: '+d.history)+'\nCredit grade: G'+d.grd.g+' ('+d.grd.label+') | EL: '+d.EL.toFixed(2)+'% | Required rate: '+d.req.toFixed(2)+'%\nStructure: '+d.str;
  else if (s==='commodities') body = 'COMMODITIES TRADE FINANCE\nCommodity: '+d.commodity+' | Exchange: '+d.exchange+'\nVolume: '+d.volume+' MT | Unit price: $'+d.price+'/MT | Total: $'+d.value+'\nGrade: '+d.grade+' | Warehouse: '+d.warehouse+' | Counterparty: '+d.counterparty+'\nOff-take/POs: '+d.po+'\n\nFor commodity_analysis, use your knowledge of '+d.exchange+' pricing for '+d.commodity+' to provide:\n- submitted_price: the submitted price per MT\n- reference_price: current estimated market price on '+d.exchange+'\n- price_delta_pct: % difference\n- exchange_comparison: price estimates on AFEX (Nigeria), ECX (Ethiopia), GCX (Ghana), JSE (South Africa) with spread vs submitted\n- viability_factors: array of {label, value, ok} covering price competitiveness, grade, warehouse, FX, counterparty\n- viability_verdict: overall assessment paragraph';
  else if (s==='re') body = 'REAL ESTATE\nAsset: '+d.assetType+' | Location: '+d.location+'\nAcquisition: $'+d.acqPrice+' | Valuation: $'+d.valuation+' | GLA: '+d.area+'sqm\nOccupancy: '+d.occupancy+'% | Annual rental: $'+d.rental+' | Target IRR: '+d.irr+'%\nTitle: '+d.title+' | Thesis: '+d.thesis;

  var commExtra = s==='commodities' ? ',"commodity_analysis":{"submitted_price":0,"reference_price":0,"price_delta_pct":0,"market_context":"string","exchange_comparison":[{"exchange":"string","price":0,"spread":"string","liquidity":"High|Medium|Low"}],"viability_factors":[{"label":"string","value":"string","ok":true}],"viability_verdict":"string"}' : '';
  var creditExtra = s==='credit' ? ',"covenant_recommendations":["list"]' : '';

  return 'You are a senior investment analyst at Prime Alpha Securities.\n\nSubmitter: '+d.name+' <'+d.email+'> | Company: '+d.company+' | Country: '+d.country+'\n\n'+body+'\n\nReturn ONLY valid JSON:\n{"overall_risk_score":1-10,"overall_risk_level":"low|medium|high|critical","investment_recommendation":"proceed|proceed_with_caution|further_diligence_required|do_not_proceed","headline":"one sentence","summary":"3-4 sentences","risk_flags":[{"severity":"critical|high|medium|low","category":"string","title":"short","detail":"explanation","mitigation":"action"}],"strengths":["list"],"diligence_gaps":["list"],"key_highlights":["list"],"key_concerns":["list"],"next_steps":["list"]'+creditExtra+commExtra+'}';
}

// ── Submit ─────────────────────────────────────────────────────────────────────
async function submitForm() {
  var btn = document.getElementById('abt');
  var st  = document.getElementById('form-status');
  var d   = GD();
  if (!d || !d.name || !d.email) { toast('Please fill in your name and email.', '#f04166'); return; }
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="sp"></span> Processing…'; }
  if (st)  st.textContent = 'Analysing…';

  var dt   = new Date().toISOString().slice(0,10);
  var name = (d.name||'anon').replace(/[^a-zA-Z0-9]/g,'_').slice(0,20);
  var co   = (d.co||d.company||d.commodity||d.assetType||'deal').replace(/[^a-zA-Z0-9]/g,'_').slice(0,25);
  var skey = 'PAS_DD_' + (CS||'doc').toUpperCase() + '_' + dt + '_' + name + '_' + co;
  var v    = VENTURES.find(function(x){return x.id===CS;}) || {label:CS, icon:'◆', color:'#4a7cff'};

  var result;
  try {
    var key = await getAnthropicKey();
    if (key) {
      if (st) st.textContent = 'AI analysis running…';
      var messages;
      if (DOC_FILE_B64 && DOC_FILE_MIME === 'application/pdf') {
        messages = [{role:'user', content:[{type:'document', source:{type:'base64', media_type:'application/pdf', data:DOC_FILE_B64}}, {type:'text', text:buildPrompt(d)}]}];
      } else {
        messages = [{role:'user', content: buildPrompt(d) + (DOC_FILE_NAME ? '\n\n[Attached: '+DOC_FILE_NAME+']' : '')}];
      }
      result = await callAnthropic(messages, 'You are a senior investment analyst at Prime Alpha Securities. Return ONLY valid JSON — no markdown fences, no preamble.', 2500);
    } else {
      if (st) st.textContent = 'No API key — using local engine…';
      result = await window.LocalEngine.analyseForm(d, CS||'pe');
    }
  } catch(e) {
    console.warn('AI error:', e.message);
    if (st) st.textContent = 'Using local engine…';
    try { result = await window.LocalEngine.analyseForm(d, CS||'pe'); }
    catch(e2) { result = {headline:'Analysis failed', overall_risk_score:5, error:e2.message}; }
  }

  var entry = {
    key: skey, strategy: (CS||'').toUpperCase(),
    companyName: d.co||d.company||d.commodity||d.assetType||'',
    submitterName: d.name, formData: d, analysis: result,
    source: 'intake', savedAt: new Date().toISOString(), s3Key: skey
  };
  await saveReview(entry);

  var area = document.getElementById('main-area');
  area.innerHTML = '<div class="success-box fu">' +
    '<div class="success-icon">✓</div>' +
    '<h2 class="success-title">Intake submitted</h2>' +
    '<p class="success-sub">Your '+v.label+' opportunity has been queued for AI-powered due diligence.<br>Results will appear in <strong>DD Reviews</strong> and <strong>Documents</strong> shortly.</p>' +
    '<div class="success-key">'+skey+'</div>' +
    '<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">' +
      '<button class="btn-primary" onclick="CS=null;render()">＋ New intake</button>' +
      '<a href="documents.html" class="btn-ghost" style="text-decoration:none;display:flex;align-items:center;padding:8px 16px">◆ View in Documents</a>' +
      '<a href="reviews.html" class="btn-ghost" style="text-decoration:none;display:flex;align-items:center;padding:8px 16px">📄 DD Reviews</a>' +
    '</div>' +
  '</div>';

  DOC_FILE_NAME = null; DOC_FILE_B64 = null; DOC_FILE_MIME = null; CS = null;
}

// ── Boot ───────────────────────────────────────────────────────────────────────
// ── Init (runs after DOM is parsed) ─────────────────────────────────────────
(function init() {
  try {
    var ph = document.getElementById('nav-placeholder');
    if (ph) ph.outerHTML = renderNav('intake.html');
    applyTheme(CUR_THEME);
    applyLang(CUR_LANG);
    updateConnectUI();
    render();
  } catch(e) {
    console.error('Intake init error:', e);
    var area = document.getElementById('main-area');
    if (area) area.innerHTML = '<div style="color:#f04166;padding:20px;font-family:monospace;font-size:12px">Init error: ' + e.message + '</div>';
  }
})();
</script>
