<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AutoOps — Demo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--surf:#0d1117;--surf2:#111827;--border:#1a2234;
  --blue:#3b82f6;--blue-d:rgba(59,130,246,.1);--green:#10b981;
  --red:#ef4444;--amber:#f59e0b;--teal:#14b8a6;--purple:#8b5cf6;
  --text:#dde4f5;--muted:#64748b;--dim:#1e2d45;
  --ff:'Segoe UI',system-ui,sans-serif;--ffm:'Consolas',monospace;
  --r:6px;--rl:10px;
}
html,body{height:100%;font-family:var(--ff);background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
input,select{font-family:inherit;color:var(--text);background:var(--surf2);border:1px solid var(--border);border-radius:var(--r);padding:7px 11px;outline:none;font-size:13px}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.fu{animation:fadeUp .2s ease both}
/* layout */
.app{display:flex;height:100vh}
.sidebar{width:210px;background:var(--surf);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.sb-name{font-family:var(--ffm);font-size:11px;font-weight:700;color:var(--blue);letter-spacing:.15em;text-transform:uppercase}
.sb-sub{font-size:10px;color:var(--muted);margin-top:2px}
nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-btn{display:flex;align-items:center;gap:9px;width:100%;text-align:left;padding:8px 11px;border-radius:var(--r);margin-bottom:2px;font-size:13px;transition:all .12s;border-left:2px solid transparent;color:var(--muted)}
.nav-btn:hover{background:var(--surf2);color:var(--text)}
.nav-btn.active{color:var(--blue);background:var(--blue-d);border-left-color:var(--blue);font-weight:600}
.sb-bottom{padding:12px 14px;border-top:1px solid var(--border)}
main{flex:1;overflow-y:auto;padding:26px 30px}
/* cards */
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);padding:18px;margin-bottom:14px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat{background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);padding:14px;border-top:2px solid var(--border)}
.stat-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.stat-val{font-family:var(--ffm);font-size:22px;font-weight:600;line-height:1}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px}
h1{font-size:20px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px}
.page-sub{color:var(--muted);font-size:12px;margin-bottom:22px}
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
.btn-p{background:var(--blue);color:#fff;padding:6px 14px;border-radius:var(--r);font-weight:600;font-size:12px}
.btn-p:hover{opacity:.85}
.btn-g{background:var(--surf2);color:var(--muted);border:1px solid var(--border);padding:5px 12px;border-radius:var(--r);font-size:12px}
.btn-d{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.3);padding:5px 12px;border-radius:var(--r);font-size:12px}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:7px 12px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border)}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--border)}
tr:hover td{background:var(--surf2)}
.run-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
/* module icon colors */
.mod-doc{color:var(--blue)}
.mod-kyc{color:var(--purple)}
.mod-comp{color:var(--red)}
.mod-tx{color:var(--green)}
.mod-email{color:var(--teal)}
.mod-pipe{color:var(--amber)}
.lbl{display:block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;font-weight:700}
/* toast */
.toast-wrap{position:fixed;bottom:18px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:6px}
.toast{background:var(--surf);border-left:3px solid var(--green);padding:9px 14px;border-radius:var(--r);font-size:13px;animation:fadeUp .2s ease both;border:1px solid rgba(16,185,129,.3);max-width:280px}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="toast-wrap" id="toasts"></div>
<script>

  {module:'transactions',task:'sync_feed',status:'success',summary:'Synced Douala Commercial Bank feed',duration:2100,records:0,time:'6h ago'},

let kycRecords=[

  {name:'Lagos Logistics Hub Ltd',type:'corporate',country:'Nigeria',status:'flagged',risk:'high',sanctions:true,pep:null,screened:'2024-11-28',docs_complete:false},

  {type:'HIGH_RISK_JURISDICTION',severity:'high',entity:'Ali Hassan Investment LLC',title:'High risk jurisdiction: UAE',detail:'UAE flagged as high-risk jurisdiction under current screening rules',status:'open',created:'2024-11-15'},
  {type:'INCOMPLETE_KYC',severity:'medium',entity:'Kofi Mensah',title:'Incomplete KYC: Kofi Mensah',detail:'Missing: ID document, proof of address, source of funds',status:'open',created:'2024-12-01'},

let transactions=[

  {date:'2024-11-28',desc:'Management fee Q4 2024 — PAS Mgmt Co',amount:-38400,type:'management_fee',status:'reconciled',auto:true,currency:'USD'},
  {date:'2024-11-25',desc:'Distribution — CameroCacao trade profit',amount:87600,type:'distribution',status:'posted',auto:true,currency:'USD'},

  {date:'2024-11-10',desc:'Interest received — MicroLend facility',amount:15000,type:'income',status:'reconciled',auto:true,currency:'USD'},

let pipelines=[
  {name:'Alpha Vantage Market Data',source:'api',schedule:'daily',status:'active',last_status:'failed',runs:142,last_run:'5h ago'},
  {name:'FRED Macro Indicators',source:'api',schedule:'weekly',status:'active',last_status:'success',runs:28,last_run:'2 days ago'},
  {name:'OpenSanctions Refresh',source:'api',schedule:'daily',status:'active',last_status:'success',runs:86,last_run:'1h ago'},
  {name:'DynamoDB → Analytics Sync',source:'database',schedule:'hourly',status:'active',last_status:'success',runs:312,last_run:'45 min ago'},
  {name:'Bank Feed — Douala Commercial',source:'file',schedule:'daily',status:'active',last_status:'success',runs:67,last_run:'6h ago'},

let emailRules=[
  {name:'KYC Document Routing',trigger:'subject_contains',condition:'KYC, identity, passport',action:'route_document',matches:23,active:true},
  {name:'Investor Query Auto-Reply',trigger:'body_contains',condition:'investor inquiry, LP question',action:'auto_reply',matches:8,active:true},
  {name:'Capital Call Auto-Create',trigger:'subject_contains',condition:'capital call, drawdown notice',action:'create_task',matches:4,active:true},

function toast(msg){
  const t=document.getElementById('toasts');
  const d=document.createElement('div');
  d.className='toast';d.textContent=msg;
  t.appendChild(d);setTimeout(()=>d.remove(),3500);
}

function tag(label,c='#3b82f6'){
  return `<span class="tag" style="background:${c}18;color:${c};border:1px solid ${c}44">${label}</span>`;
}

function render(){
  document.getElementById('app').innerHTML=`
    <div class="sidebar">
      <div class="sb-logo">
        <div class="sb-name">AutoOps</div>
        <div class="sb-sub">Operational Automation · Demo</div>
      </div>
      <nav>
        ${[
          ['dashboard','⬡','Dashboard'],
          ['documents','📄','Document Processor'],
          ['kyc','🔍','KYC / AML'],
          ['compliance','🛡','Compliance'],
          ['transactions','💳','Transactions'],
          ['email','✉️','Email Workflows'],
          ['pipelines','⚙️','Data Pipelines'],
        ].map(([k,ic,lb])=>`
          <button class="nav-btn ${state.tab===k?'active':''}" onclick="setTab('${k}')">
            <span style="font-size:13px">${ic}</span>${lb}
          </button>`).join('')}
      </nav>
      <div class="sb-bottom">
        <div style="font-size:11px;color:var(--muted)">Initiative 13 of 15</div>
        <div style="font-size:10px;color:var(--dim);margin-top:2px">Prime Alpha Securities</div>
      </div>
    </div>
    <main id="main" class="fu">${renderPage()}</main>`;
  afterRender();
}

function renderPage(){
  switch(state.tab){
    case 'dashboard':    return renderDashboard();
    case 'documents':    return renderDocuments();
    case 'kyc':          return renderKYC();
    case 'compliance':   return renderCompliance();
    case 'transactions': return renderTransactions();
    case 'email':        return renderEmail();
    case 'pipelines':    return renderPipelines();
    default: return renderDashboard();
  }
}

function renderDashboard(){
  const success=runLog.filter(r=>r.status==='success').length;
  const rate=Math.round(success/runLog.length*100);
  const byMod={};runLog.forEach(r=>{byMod[r.module]=(byMod[r.module]||0)+1});
  return `
    <h1>Automation Dashboard</h1>
    <div class="page-sub">Last 7 days across all modules</div>
    <div class="stat-grid">
      <div class="stat" style="border-top-color:var(--blue)"><div class="stat-lbl">Total Runs</div><div class="stat-val" style="color:var(--blue)">${runLog.length}</div><div class="stat-sub">Last 7 days</div></div>
      <div class="stat" style="border-top-color:var(--green)"><div class="stat-lbl">Success Rate</div><div class="stat-val" style="color:var(--green)">${rate}%</div></div>
      <div class="stat" style="border-top-color:var(--red)"><div class="stat-lbl">Failed</div><div class="stat-val" style="color:${runLog.filter(r=>r.status==='failed').length>0?'var(--red)':'var(--green)'}">${runLog.filter(r=>r.status==='failed').length}</div></div>
      <div class="stat"><div class="stat-lbl">Open Alerts</div><div class="stat-val">${alerts.filter(a=>a.status==='open').length}</div><div class="stat-sub">Compliance</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1.2fr 1fr;gap:14px">
      <div class="card">
        <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px">Runs by module</div>
        <canvas id="chart-mod" height="150"></canvas>
      </div>
      <div class="card">
        <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px">Recent activity</div>
        ${runLog.slice(0,8).map(r=>`
          <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">
            <div style="display:flex;align-items:center;gap:8px">
              <span class="run-dot" style="background:${r.status==='success'?'var(--green)':'var(--red)'}"></span>
              <div>
                <div style="font-size:12px;font-weight:500">${r.task}</div>
                <div style="font-size:10px;color:var(--muted)">${MOD_ICON[r.module]} ${r.module}</div>
              </div>
            </div>
            <div style="font-size:10px;color:var(--muted);flex-shrink:0;margin-left:8px">${r.time}</div>
          </div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px">Module status</div>
      <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:10px">
        ${Object.entries(MOD_ICON).map(([mod,icon])=>{
          const modRuns=runLog.filter(r=>r.module===mod);
          const modFailed=modRuns.filter(r=>r.status==='failed').length;
          const c=MOD_COLOR[mod];
          return `
            <div style="text-align:center;padding:12px;border-radius:var(--rl);background:var(--surf2);border:1px solid ${modFailed>0?'var(--red)':c}33">
              <div style="font-size:22px;margin-bottom:6px">${icon}</div>
              <div style="font-size:11px;font-weight:600;color:${c};margin-bottom:2px">${mod}</div>
              <div style="font-size:10px;color:${modFailed>0?'var(--red)':'var(--green)'}">${modFailed>0?modFailed+' failed':'All OK'}</div>
            </div>`;
        }).join('')}
      </div>
    </div>`;
}

    {filename:'Pitch_StartupXYZ.pptx',source:'email',detected:'Pitch Deck',confidence:'85%',routed:'Deals Module',status:'routed',received:'2024-11-20'},
    {filename:'Wire_Transfer_Notice.pdf',source:'api',detected:'Financial Transaction',confidence:'90%',routed:'Transactions',status:'routed',received:'2024-11-18'},

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div><h1>Document Processor</h1><div class="page-sub">Automatic ingestion, classification and routing</div></div>
      <button class="btn-p" onclick="simulateDoc()">+ Simulate Incoming Doc</button>
    </div>
    <div class="card">
      <table>
        <thead><tr><th>Filename</th><th>Source</th><th>Detected Type</th><th>Confidence</th><th>Routed To</th><th>Status</th><th>Received</th></tr></thead>
        <tbody id="doc-tbody">
          ${docs.map(d=>`<tr>
            <td style="font-weight:500;font-family:var(--ffm);font-size:12px">${d.filename}</td>

            <td style="font-size:12px">${d.detected}</td>
            <td style="font-family:var(--ffm);color:var(--green)">${d.confidence}</td>
            <td style="font-size:12px;color:var(--muted)">${d.routed}</td>
            <td>${tag(d.status,'#10b981')}</td>

          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

function renderKYC(){
  const statC={approved:'#10b981',pending:'#f59e0b',flagged:'#ef4444',rejected:'#ef4444',expired:'#64748b',screening:'#3b82f6'};
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div><h1>KYC / AML Engine</h1><div class="page-sub">${kycRecords.length} records · ${kycRecords.filter(r=>r.status==='flagged').length} flagged</div></div>
      <button class="btn-p" onclick="runBatchScreen()">▶ Run Batch Screen</button>
    </div>
    <div class="stat-grid">
      <div class="stat" style="border-top-color:#10b981"><div class="stat-lbl">Approved</div><div class="stat-val" style="color:#10b981">${kycRecords.filter(r=>r.status==='approved').length}</div></div>
      <div class="stat" style="border-top-color:#ef4444"><div class="stat-lbl">Flagged</div><div class="stat-val" style="color:#ef4444">${kycRecords.filter(r=>r.status==='flagged').length}</div></div>
      <div class="stat" style="border-top-color:#f59e0b"><div class="stat-lbl">Pending</div><div class="stat-val" style="color:#f59e0b">${kycRecords.filter(r=>r.status==='pending').length}</div></div>
      <div class="stat" style="border-top-color:#8b5cf6"><div class="stat-lbl">High Risk</div><div class="stat-val" style="color:#8b5cf6">${kycRecords.filter(r=>r.risk==='high'||r.risk==='critical').length}</div></div>
    </div>
    <div class="card">
      <table>
        <thead><tr><th>Entity</th><th>Type</th><th>Country</th><th>Status</th><th>Risk</th><th>Sanctions</th><th>PEP Clear</th><th>Docs</th><th>Screened</th><th></th></tr></thead>
        <tbody>
          ${kycRecords.map((r,i)=>`<tr>
            <td style="font-weight:600">${r.name}</td>
            <td>${tag(r.type,'#8b5cf6')}</td>
            <td style="font-size:12px">${r.country}</td>
            <td>${tag(r.status,statC[r.status]||'#64748b')}</td>
            <td>${r.risk?tag(r.risk,SEV_COLOR[r.risk]||'#64748b'):'—'}</td>
            <td style="color:${r.sanctions===true?'var(--green)':r.sanctions===false?'var(--red)':'var(--muted)'}">${r.sanctions===true?'✓ Clear':r.sanctions===false?'✗ Hit':'Pending'}</td>
            <td style="color:${r.pep===true?'var(--green)':r.pep===false?'var(--red)':'var(--muted)'}">${r.pep===true?'✓ Clear':r.pep===false?'✗ Hit':'Pending'}</td>
            <td style="color:${r.docs_complete?'var(--green)':'var(--amber)'}">${r.docs_complete?'Complete':'Incomplete'}</td>
            <td style="font-size:11px;color:var(--muted)">${r.screened||'—'}</td>
            <td><button class="btn-g" style="font-size:11px" onclick="rescreenKYC(${i})">Rescreen</button></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

function renderCompliance(){
  const statC={open:'#ef4444',acknowledged:'#f59e0b',resolved:'#10b981',false_positive:'#64748b'};
  return `
    <h1>Compliance</h1>
    <div class="page-sub">${alerts.filter(a=>a.status==='open').length} open alerts</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div>
        <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">Compliance Alerts</div>
        ${alerts.map((a,i)=>`
          <div class="card" style="margin-bottom:10px;border-left:3px solid ${SEV_COLOR[a.severity]};border-radius:0 var(--rl) var(--rl) 0;padding:14px">
            <div style="display:flex;gap:7px;align-items:center;margin-bottom:7px">
              ${tag(a.severity,SEV_COLOR[a.severity])}
              ${tag(a.type,'#64748b')}
              <span style="font-weight:600;font-size:13px">${a.title}</span>
            </div>
            <p style="font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:8px">${a.detail}</p>
            <div style="display:flex;gap:7px;align-items:center">
              ${tag(a.status,statC[a.status]||'#64748b')}
              <span style="font-size:10px;color:var(--muted)">${a.created}</span>
              ${a.status==='open'?`<button class="btn-g" style="font-size:11px;margin-left:auto" onclick="resolveAlert(${i})">Resolve</button>`:''}
            </div>
          </div>`).join('')}
      </div>
      <div>
        <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">Active Watchlist</div>
        ${[
          {name:'Ali Hassan Investment LLC',reason:'High-risk jurisdiction',country:'UAE',checked:'2024-11-28'},
          {name:'Lagos Logistics Hub Ltd',reason:'Incomplete KYC',country:'Nigeria',checked:'2024-11-28'},
          {name:'Anonymous Shell Co',reason:'Beneficial ownership unclear',country:'BVI',checked:'2024-11-15'},
        ].map(w=>`
          <div class="card" style="margin-bottom:10px;padding:13px">
            <div style="font-weight:600;margin-bottom:5px">${w.name}</div>
            <div style="display:flex;gap:6px;align-items:center;margin-bottom:4px">
              ${tag(w.reason,'#ef4444')}
              <span style="font-size:11px;color:var(--muted)">${w.country}</span>
            </div>
            <div style="font-size:10px;color:var(--muted)">Last checked: ${w.checked}</div>
          </div>`).join('')}
        <button class="btn-p" style="width:100%;margin-top:4px" onclick="toast('Watchlist screen queued — will run via Celery Beat')">▶ Run Watchlist Screen</button>
      </div>
    </div>`;
}

function renderTransactions(){
  const TYPE_C={capital_call:'#3b82f6',distribution:'#10b981',management_fee:'#f59e0b',performance_fee:'#f59e0b',investment:'#8b5cf6',divestment:'#14b8a6',expense:'#ef4444',income:'#10b981',transfer:'#64748b',other:'#64748b'};
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div><h1>Transactions</h1><div class="page-sub">${transactions.length} records · ${transactions.filter(t=>t.status==='pending').length} pending review</div></div>
      <button class="btn-p" onclick="toast('Auto-classify all pending transactions queued')">▶ Auto-Classify All</button>
    </div>
    <div class="card">
      <table>
        <thead><tr><th>Date</th><th>Description</th><th>Amount</th><th>Type</th><th>Status</th><th>Auto</th></tr></thead>
        <tbody>
          ${transactions.map((t,i)=>`<tr>
            <td style="font-family:var(--ffm);font-size:12px">${t.date}</td>
            <td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.desc}</td>
            <td style="font-family:var(--ffm);font-weight:600;color:${t.amount>=0?'var(--green)':'var(--red)'}">${t.amount>=0?'+':''}${t.amount.toLocaleString()} ${t.currency}</td>
            <td>${tag(t.type.replace(/_/g,' '),TYPE_C[t.type]||'#64748b')}</td>
            <td>${tag(t.status,t.status==='reconciled'?'#10b981':t.status==='posted'?'#14b8a6':t.status==='pending'?'#f59e0b':'#64748b')}</td>
            <td style="color:${t.auto?'var(--green)':'var(--muted)'}">${t.auto?'✓ Auto':'Manual'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

function renderEmail(){
  return `
    <h1>Email Workflows</h1>
    <div class="page-sub">${emailRules.filter(r=>r.active).length} active rules · 36 emails processed this week</div>
    <div class="card">
      <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px">Routing Rules</div>
      <table>
        <thead><tr><th>Rule</th><th>Trigger</th><th>Condition</th><th>Action</th><th>Matches</th><th>Active</th><th></th></tr></thead>
        <tbody>
          ${emailRules.map((r,i)=>`<tr>
            <td style="font-weight:600">${r.name}</td>
            <td>${tag(r.trigger.replace(/_/g,' '),'#3b82f6')}</td>
            <td style="font-size:12px;color:var(--muted)">${r.condition}</td>
            <td>${tag(r.action.replace(/_/g,' '),'#14b8a6')}</td>
            <td style="font-family:var(--ffm)">${r.matches}</td>
            <td style="color:${r.active?'var(--green)':'var(--muted)'}">${r.active?'✓ Active':'Paused'}</td>
            <td><button class="btn-g" style="font-size:11px" onclick="toggleRule(${i})">${r.active?'Pause':'Activate'}</button></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div class="card">
      <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px">Recent Follow-up Tasks</div>
      ${[
        {subject:'Review MicroLend subscription docs',due:'2024-12-05',assigned:'Noe Ikoué',status:'pending'},
        {subject:'Chase Lagos Logistics proof of address',due:'2024-12-03',assigned:'Balde Ibrahima',status:'overdue'},
        {subject:'Call Kofi Mensah re: KYC docs',due:'2024-12-07',assigned:'Johan Botouli',status:'pending'},
      ].map((t,i)=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)">
          <div>
            <div style="font-size:13px;font-weight:500">${t.subject}</div>
            <div style="font-size:11px;color:var(--muted)">${t.assigned} · Due ${t.due}</div>
          </div>
          <div style="display:flex;gap:7px;align-items:center">
            ${tag(t.status,t.status==='overdue'?'#ef4444':t.status==='done'?'#10b981':'#f59e0b')}
            <button class="btn-g" style="font-size:11px" onclick="completeTask(${i},'${t.subject}')">Done</button>
          </div>
        </div>`).join('')}
    </div>`;
}

function renderPipelines(){
  const statC={active:'#10b981',paused:'#f59e0b',error:'#ef4444'};
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div><h1>Data Pipelines</h1><div class="page-sub">${pipelines.length} configured · ${pipelines.filter(p=>p.status==='active').length} active</div></div>
      <button class="btn-p" onclick="toast('All due pipelines queued for execution')">▶ Run All Due</button>
    </div>
    <div class="card">
      <table>
        <thead><tr><th>Pipeline</th><th>Source</th><th>Schedule</th><th>Status</th><th>Last Run</th><th>Total Runs</th><th></th></tr></thead>
        <tbody>
          ${pipelines.map((p,i)=>`<tr>
            <td style="font-weight:600">${p.name}</td>
            <td>${tag(p.source,'#f59e0b')}</td>
            <td>${tag(p.schedule,'#64748b')}</td>
            <td>${tag(p.status,statC[p.status]||'#64748b')}</td>
            <td>
              <div style="display:flex;align-items:center;gap:6px">
                <span class="run-dot" style="background:${p.last_status==='success'?'var(--green)':'var(--red)'}"></span>
                <span style="font-size:12px;color:var(--muted)">${p.last_run}</span>
              </div>
            </td>
            <td style="font-family:var(--ffm)">${p.runs}</td>
            <td>
              <div style="display:flex;gap:5px">
                <button class="btn-p" style="font-size:11px;padding:4px 10px" onclick="runPipeline(${i},'${p.name}')">▶ Run</button>
                <button class="btn-g" style="font-size:11px" onclick="pausePipeline(${i})">${p.status==='active'?'Pause':'Resume'}</button>
              </div>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

function afterRender(){
  if(state.tab==='dashboard'){
    const ctx=document.getElementById('chart-mod');
    if(ctx){
      if(state.chart) state.chart.destroy();
      const byMod={};
      runLog.forEach(r=>{byMod[r.module]=(byMod[r.module]||0)+1});
      state.chart=new Chart(ctx,{type:'bar',data:{
        labels:Object.keys(byMod).map(k=>k),
        datasets:[{data:Object.values(byMod),backgroundColor:Object.keys(byMod).map(k=>MOD_COLOR[k]),borderRadius:4}]
      },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{x:{grid:{display:false},ticks:{color:'#64748b',font:{size:11}}},
                y:{grid:{color:'#1a2234'},ticks:{color:'#64748b',font:{size:11}}}}}});
    }
  }
}

window.setTab=t=>{state.tab=t;render()};

window.simulateDoc=()=>{
  const types=['KYC_Document.pdf','Invoice_Legal_Fees.pdf','Subscription_Agreement_New_LP.docx','Wire_Transfer_FCFA.pdf'];
  const t=types[Math.floor(Math.random()*types.length)];
  toast('Incoming: '+t+' → classifying...');
  setTimeout(()=>{
    toast('Classified as KYC Document (confidence 91%) → routed to KYC Module ✓');
    runLog.unshift({module:'documents',task:'classify_and_route',status:'success',summary:'Classified as KYC Document, routed to KYC Module',duration:180,records:1,time:'just now'});
  },1500);
};

window.runBatchScreen=async()=>{
  toast('Batch KYC screening started...');
  await new Promise(r=>setTimeout(r,2000));
  kycRecords.forEach(r=>{if(r.status==='pending'){r.status='approved';r.risk='low';r.sanctions=true;r.pep=true;r.screened=new Date().toISOString().slice(0,10);}});
  toast('Batch screen complete: all pending records screened ✓');
  runLog.unshift({module:'kyc',task:'screen_record',status:'success',summary:`Screened ${kycRecords.length} records`,duration:3400,records:kycRecords.length,time:'just now'});
  render();
};

window.rescreenKYC=async i=>{
  const r=kycRecords[i];
  toast('Re-screening '+r.name+'...');
  await new Promise(x=>setTimeout(x,1200));
  r.screened=new Date().toISOString().slice(0,10);
  if(r.status==='pending'){r.status='approved';r.risk='low';r.sanctions=true;r.pep=true;}
  toast(r.name+' re-screened: '+r.status+' ✓');
  render();
};

window.resolveAlert=(i)=>{
  alerts[i].status='resolved';
  toast('Alert resolved: '+alerts[i].title);
  render();
};

window.toggleRule=i=>{
  emailRules[i].active=!emailRules[i].active;
  toast(emailRules[i].name+(emailRules[i].active?' activated':' paused'));
  render();
};

window.completeTask=(i,subject)=>{
  toast('Task marked done: '+subject.slice(0,40));
};

window.runPipeline=async(i,name)=>{
  toast('Running: '+name+'...');
  await new Promise(r=>setTimeout(r,1600));
  pipelines[i].last_status='success';
  pipelines[i].runs++;
  pipelines[i].last_run='just now';
  toast(name+' completed ✓');
  runLog.unshift({module:'pipeline',task:'run_pipeline',status:'success',summary:`Pipeline '${name}' ran successfully`,duration:1600,records:Math.floor(Math.random()*200)+20,time:'just now'});
  render();
};

window.pausePipeline=i=>{
  pipelines[i].status=pipelines[i].status==='active'?'paused':'active';
  toast(pipelines[i].name+(pipelines[i].status==='active'?' resumed':' paused'));
  render();
};

render();
</script>
</body>
</html>
