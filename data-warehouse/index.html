<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Data Warehouse · Prime Alpha Securities</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,300&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07090f;--surf:#0d1119;--surf2:#121722;--surf3:#171e2d;--border:#1a2238;--blue:#4a7cff;--blue-d:rgba(74,124,255,.1);--green:#1fc98a;--red:#f04166;--amber:#f59e0b;--gold:#c9a84c;--purple:#a78bfa;--text:#dde4f5;--muted:#566382;--dim:#1c2540;--ff:'Figtree',sans-serif;--ffm:'DM Mono',monospace;--ffd:'Fraunces',serif;--r:6px;--rl:10px;--acc:#f04166}
html[data-theme="light"]{--bg:#f0f2f7;--surf:#fff;--surf2:#f4f6fb;--surf3:#edf0f7;--border:#dde1ed;--blue:#2563eb;--blue-d:rgba(37,99,235,.08);--green:#16a34a;--red:#dc2626;--amber:#d97706;--gold:#b45309;--purple:#7c3aed;--text:#0f172a;--muted:#64748b;--dim:#e2e8f0}
html,body{min-height:100%;font-family:var(--ff);background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fu{animation:fadeUp .2s ease both}.fu1{animation-delay:.06s}.fu2{animation-delay:.12s}.fu3{animation-delay:.18s}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
.app{display:flex;flex-direction:column;min-height:100vh}
.topnav{background:var(--surf);border-bottom:1px solid var(--border);padding:0 20px;height:48px;display:flex;align-items:center;flex-shrink:0;position:sticky;top:0;z-index:100}
.nav-logo{font-family:var(--ffm);font-size:11px;font-weight:500;color:var(--acc);letter-spacing:.15em;text-transform:uppercase}
.nav-sep{color:var(--border);margin:0 8px}
.nav-sub{font-size:11px;color:var(--muted);margin-right:20px}
.nav-links{display:flex;align-items:center;gap:2px;flex:1}
.nav-item{padding:6px 13px;border-radius:var(--r);font-size:12px;font-weight:500;color:var(--muted);text-decoration:none;transition:all .12s}
.nav-item:hover{color:var(--text);background:var(--surf2)}
.nav-item.active{color:var(--acc);background:rgba(74,124,255,.1);font-weight:600}
.tl-btn{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:var(--r);border:1px solid var(--border);background:var(--surf2);cursor:pointer;font-size:11px;color:var(--muted);transition:all .12s;margin-left:8px}
.tl-btn:hover{border-color:var(--acc);color:var(--text)}
.main{flex:1;padding:28px 24px;max-width:1100px;margin:0 auto;width:100%}
.page-eyebrow{font-family:var(--ffm);font-size:10px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--acc);margin-bottom:6px}
.page-title{font-family:var(--ffd);font-size:26px;font-weight:600;margin-bottom:4px}
.page-sub{font-size:12px;color:var(--muted);margin-bottom:24px}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:24px}
.m-box{background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);padding:13px 14px}
.m-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:5px}
.m-val{font-family:var(--ffm);font-size:19px;font-weight:700}
.m-sub{font-size:10px;color:var(--muted);margin-top:2px}
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--rl)}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sh-title{font-size:13px;font-weight:700}
.btn-acc{background:var(--acc);color:#000;border:none;border-radius:var(--r);padding:7px 18px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:opacity .15s}
.btn-acc:hover{opacity:.85}
.btn-sec{border:1px solid var(--border);background:var(--surf2);border-radius:var(--r);padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text);transition:all .15s}
.btn-sec:hover{border-color:var(--acc);color:var(--acc)}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:11px 12px;border-bottom:1px solid var(--border);font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surf2)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:24px;width:480px;max-width:90vw;max-height:85vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.modal-close{font-size:20px;color:var(--muted);cursor:pointer;line-height:1}
.modal-close:hover{color:var(--text)}
.form-row{margin-bottom:14px}
.form-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px;display:block}
.form-input,.form-select,.form-textarea{width:100%;padding:8px 12px;background:var(--surf2);border:1px solid var(--border);border-radius:var(--r);font-size:13px;color:var(--text);font-family:var(--ff);outline:none;transition:border-color .15s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--acc)}
.form-textarea{min-height:80px;resize:vertical}
.toast{position:fixed;bottom:20px;right:20px;padding:12px 20px;border-radius:var(--rl);font-size:13px;font-weight:600;z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.pg-footer{text-align:center;padding:16px;border-top:1px solid rgba(201,168,76,.1);font-size:11px;color:var(--muted);margin-top:32px}
.pg-footer span{color:var(--gold);font-weight:700;letter-spacing:.1em;text-transform:uppercase}

.idx-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.idx-card{display:flex;align-items:center;gap:12px;background:var(--surf2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;cursor:pointer;transition:all .15s;text-decoration:none;color:var(--text)}
.idx-card:hover{border-color:var(--acc);transform:translateY(-2px)}
.idx-icon{font-size:18px;color:var(--acc)}
.idx-label{font-size:13px;font-weight:600}
</style>
</head>
<body class="app">
<nav class="topnav">
<span class="nav-logo" style="color:#f04166">PAS · 05</span>
<span class="nav-sep">›</span>
<span class="nav-sub">Data Warehouse</span>
<div class="nav-links"><a class="nav-item" href="explorer.html">Explorer</a><a class="nav-item" href="queries.html">Queries</a><a class="nav-item" href="ingestion.html">Ingestion</a><a class="nav-item" href="catalog.html">Catalog</a><a class="nav-item" href="cost.html">Cost</a></div>
<div style="display:flex;gap:8px;margin-left:auto">
<a href="../../index.html" class="tl-btn">← Roadmap</a>
<button class="tl-btn" id="themebtn" onclick="toggleTheme()">☀ Light</button>
</div>
</nav>
<main class="main fu">
<div class="page-eyebrow">Initiative 05 / 15</div>
<div class="page-title">Data Warehouse</div>
<div class="page-sub">Unified Financial Data Platform</div>
<div style="background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);padding:28px;margin-bottom:24px">
<div style="font-family:var(--ffm);font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px">Initiative 05 / 15</div>
<div style="font-size:13px;color:var(--muted);margin-bottom:20px">Unified Financial Data Platform</div>
<div class="idx-grid"><a href="explorer.html" class="idx-card"><div class="idx-icon">▸</div><div class="idx-label">Explorer</div></a>
<a href="queries.html" class="idx-card"><div class="idx-icon">▸</div><div class="idx-label">Queries</div></a>
<a href="ingestion.html" class="idx-card"><div class="idx-icon">▸</div><div class="idx-label">Ingestion</div></a>
<a href="catalog.html" class="idx-card"><div class="idx-icon">▸</div><div class="idx-label">Catalog</div></a>
<a href="cost.html" class="idx-card"><div class="idx-icon">▸</div><div class="idx-label">Cost</div></a>
</div>
</div>
</main>
<div class="pg-footer"><span>Prime Alpha Securities</span> · Data Warehouse · Confidential</div>
<div id="toast" class="toast"></div>
<script>
function openM(id){document.getElementById(id).classList.add('open')}
function closeM(id){document.getElementById(id).classList.remove('open')}
function toast(msg,col){const t=document.getElementById('toast');t.textContent=msg;t.style.background=col||'#1fc98a';t.style.color=col?'#fff':'#000';t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2800)}
function toggleTheme(){const cur=document.documentElement.getAttribute('data-theme')||'dark',next=cur==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',next);localStorage.setItem('pas_theme',next);const b=document.getElementById('themebtn');if(b)b.textContent=next==='dark'?'☀ Light':'◑ Dark'}
(function(){const t=localStorage.getItem('pas_theme')||'dark';document.documentElement.setAttribute('data-theme',t);const b=document.getElementById('themebtn');if(b)b.textContent=t==='dark'?'☀ Light':'◑ Dark'})();

</script>
</body>
</html>
