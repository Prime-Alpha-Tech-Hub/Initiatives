<html lang="en">
<head>

<style>

:root{--bg:#07090f;--surf:#0d1119;--surf2:#121722;--surf3:#171e2d;--border:#1a2238;--border2:#1f2d47;--blue:#4a7cff;--blue-d:rgba(74,124,255,.1);--green:#1fc98a;--red:#f04166;--amber:#f59e0b;--gold:#c9a84c;--purple:#a78bfa;--text:#dde4f5;--muted:#566382;--dim:#1c2540;--ff:'Figtree',system-ui,sans-serif;--ffm:'DM Mono',monospace;--r:6px;--rl:10px;}
html[data-theme="light"]{--bg:#f0f2f7;--surf:#ffffff;--surf2:#f4f6fb;--surf3:#edf0f8;--border:#dde1ed;--border2:#c5cbe0;--blue:#2563eb;--blue-d:rgba(37,99,235,.1);--green:#16a34a;--red:#dc2626;--amber:#d97706;--gold:#b45309;--purple:#7c3aed;--text:#0f172a;--muted:#64748b;--dim:#e2e8f0;}
html[data-theme="light"] body{color-scheme:light}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--ff);background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:inherit;color:inherit}
input,select,textarea{font-family:var(--ff);color:var(--text);background:var(--surf2);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;outline:none;font-size:13px;transition:border .12s}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
select option{background:var(--surf2)}
textarea{resize:vertical;min-height:72px}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fu{animation:fadeUp .2s ease both}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;white-space:nowrap}
.badge{background:var(--blue-d);color:var(--blue);border-radius:12px;padding:2px 8px;font-size:11px;font-weight:700}
.btn-p{background:var(--blue);color:#fff;padding:8px 16px;border-radius:var(--r);font-size:12px;font-weight:700;border:none;cursor:pointer;transition:all .12s}
.btn-p:hover{opacity:.88}
.btn-g{background:var(--surf2);color:var(--muted);border:1px solid var(--border);padding:7px 14px;border-radius:var(--r);font-size:12px;cursor:pointer;transition:all .12s}
.btn-g:hover{border-color:var(--border2);color:var(--text)}
/* App layout */
.app-shell{display:flex;height:100vh;overflow:hidden}
/* Sidebar */
#sidebar{width:220px;min-width:220px;background:var(--surf);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .22s ease,min-width .22s ease;flex-shrink:0}
#sidebar.collapsed{width:52px;min-width:52px}
#sidebar.collapsed .nav-label{display:none}
#sidebar.collapsed .nav-link{justify-content:center;padding:10px 0}
#sidebar.collapsed .sidebar-header .sb-title{display:none}
.sidebar-header{padding:16px 14px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sb-title{font-family:var(--ffm);font-size:11px;font-weight:500;color:var(--blue);letter-spacing:.15em;text-transform:uppercase;white-space:nowrap}
.sb-toggle{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px;border-radius:var(--r);flex-shrink:0}
.sb-toggle:hover{color:var(--text);background:var(--surf2)}
.nav-section{flex:1;overflow-y:auto;padding:8px 0}
.nav-link{display:flex;align-items:center;gap:10px;padding:9px 14px;font-size:13px;color:var(--muted);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:all .12s;white-space:nowrap;font-family:inherit}
.nav-link:hover{color:var(--text);background:var(--surf2)}
.nav-link.active{color:var(--blue);background:var(--blue-d);font-weight:600}
.nav-icon{width:20px;text-align:center;flex-shrink:0;font-size:14px}
.sidebar-footer{padding:12px;border-top:1px solid var(--border);flex-shrink:0}
/* Main area */
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:50px;background:var(--surf);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;position:relative}
.topbar-title{flex:1;font-size:14px;font-weight:600}
.main-content{flex:1;overflow-y:auto;padding:24px;min-height:0}
/* Cards */
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);padding:18px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:700;margin-bottom:12px;color:var(--text)}
.page-header{margin-bottom:22px}
.page-header h1{font-size:22px;font-weight:700;margin-bottom:4px}
.page-sub{font-size:12px;color:var(--muted)}
/* Stats grid */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
@media(max-width:900px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px}
.stat-card.blue{border-top:3px solid var(--blue)}
.stat-card.green{border-top:3px solid var(--green)}
.stat-card.amber{border-top:3px solid var(--amber)}
.stat-card.purple{border-top:3px solid var(--purple)}
.stat-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px}
.stat-val{font-size:26px;font-weight:700;margin-bottom:2px}
.stat-sub{font-size:11px;color:var(--muted)}
/* Kanban */
.kanban{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;overflow-x:auto;padding-bottom:8px}
.kanban-col{min-width:160px}
.kanban-head{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--surf);border:1px solid var(--border);border-radius:var(--r);border-top:3px solid;margin-bottom:8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
.deal-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:10px 11px;margin-bottom:6px;cursor:pointer;transition:all .12s}
.deal-card:hover{border-color:var(--border2);transform:translateY(-1px)}
/* Fields */
.field-label{display:block;font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.field-input{width:100%;padding:8px 12px;background:var(--surf2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:13px;font-family:inherit;outline:none}
.field-input:focus{border-color:var(--blue)}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:5000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open,.modal-overlay[style*="flex"]{display:flex}
.modal-box{background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);padding:24px;max-width:640px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5)}
/* Connect panel */
.connect-panel{position:absolute;top:51px;right:16px;width:380px;background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);padding:18px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:9000}
.cp-lbl{display:block;font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.cp-input{font-family:var(--ffm);font-size:12px;width:100%;padding:7px 10px;background:var(--surf2);border:1px solid var(--border);border-radius:var(--r);color:var(--text)}
.cp-save{background:var(--blue);color:#fff;padding:7px 14px;border-radius:var(--r);font-size:12px;font-weight:600;border:none;cursor:pointer}
.cp-cancel{background:var(--surf2);color:var(--muted);border:1px solid var(--border);padding:6px 12px;border-radius:var(--r);font-size:12px;cursor:pointer}
.cp-clear{background:rgba(240,65,102,.08);color:var(--red);border:1px solid rgba(240,65,102,.2);padding:6px 12px;border-radius:var(--r);font-size:12px;cursor:pointer;margin-left:auto}
.connect-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--r);border:1px solid var(--border);background:var(--surf2);font-size:12px;color:var(--muted);cursor:pointer;transition:all .12s}
.connect-btn:hover{border-color:var(--blue)}
.connect-btn.connected{border-color:var(--green);color:var(--green)}
.connect-dot{width:7px;height:7px;border-radius:50%;background:var(--border)}
.connect-dot.on{background:var(--green)}
/* Profile */
.profile-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0}
.profile-dropdown{position:absolute;top:51px;right:16px;width:270px;background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:9000}
.profile-page{position:fixed;inset:0;background:var(--bg);z-index:8000;overflow-y:auto;display:none}
.profile-page.open{display:block}
/* Toast */
.toast-wrap{position:fixed;bottom:18px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:6px}
.toast{background:var(--surf);border-left:3px solid var(--green);padding:9px 14px;border-radius:var(--r);font-size:12px;animation:fadeUp .2s ease both;border:1px solid rgba(31,201,138,.25);max-width:320px}
/* Footer */
.pg-footer{padding:10px 20px;border-top:1px solid rgba(201,168,76,.1);text-align:center;font-size:11px;color:var(--muted);flex-shrink:0}
.pg-footer span{color:var(--gold);font-weight:700;letter-spacing:.1em;text-transform:uppercase}

</style>
</head>
<body>
<div class="app-shell">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-header">
      <span class="sb-title">AlphaCore</span>

    </div>

    <div class="main-content" id="main-content">

    </div>

</div>

let CUR_THEME = localStorage.getItem('dd_theme')||'dark';
let CUR_LANG  = localStorage.getItem('dd_lang')||'en';
function applyTheme(t){
  CUR_THEME=t;
  let el=document.getElementById('__tv__');
  if(!el){el=document.createElement('style');el.id='__tv__';document.head.appendChild(el);}
  if(t==='light'){
    document.documentElement.setAttribute('data-theme','light');
    el.textContent=':root{--bg:#f0f2f7!important;--surf:#ffffff!important;--surf2:#f4f6fb!important;--surf3:#edf0f8!important;--border:#dde1ed!important;--border2:#c5cbe0!important;--blue:#2563eb!important;--blue-d:rgba(37,99,235,.1)!important;--green:#16a34a!important;--red:#dc2626!important;--amber:#d97706!important;--gold:#b45309!important;--purple:#7c3aed!important;--text:#0f172a!important;--muted:#64748b!important;--dim:#e2e8f0!important;}';
  }else{document.documentElement.removeAttribute('data-theme');el.textContent='';}
  localStorage.setItem('dd_theme',t);
  const btn=document.getElementById('theme-btn');if(btn)btn.textContent=t==='dark'?'☀ Light':'◑ Dark';
}
function toggleTheme(){applyTheme(CUR_THEME==='dark'?'light':'dark');}
function applyLang(l){CUR_LANG=l;localStorage.setItem('dd_lang',l);const btn=document.getElementById('lang-btn');if(btn)btn.textContent=l==='en'?'🇫🇷 FR':'🇬🇧 EN';}
function toggleLang(){applyLang(CUR_LANG==='en'?'fr':'en');}

let DD_CONN={};try{DD_CONN=JSON.parse(localStorage.getItem('dd_connection')||'{}');}catch(e){}
function updateConnectUI(){
  const connected=!!(DD_CONN.anthropicKey||DD_CONN.alphacore);
  const dot=document.getElementById('connect-dot');const lbl=document.getElementById('connect-label');const cbtn=document.querySelector('.connect-btn');
  if(dot)dot.classList.toggle('on',connected);if(lbl)lbl.textContent=connected?'Connected':'Connect';if(cbtn)cbtn.classList.toggle('connected',connected);
  const fm={'cp-anthropic':DD_CONN.anthropicKey,'cp-ac-url':DD_CONN.alphacore,'cp-dd-url':DD_CONN.ddengine,'cp-ao-url':DD_CONN.autoops};
  Object.keys(fm).forEach(id=>{const el=document.getElementById(id);if(el&&fm[id])el.value=fm[id];});
}
function toggleConnect(){const p=document.getElementById('connect-panel');if(!p)return;const open=p.style.display==='none'||!p.style.display;p.style.display=open?'block':'none';if(open)updateConnectUI();}
function saveConnect(){
  const ak=document.getElementById('cp-anthropic')?.value?.trim()||'';
  const ac=document.getElementById('cp-ac-url')?.value?.trim()||'';
  const dd=document.getElementById('cp-dd-url')?.value?.trim()||'';
  const ao=document.getElementById('cp-ao-url')?.value?.trim()||'';
  if(!ak&&!ac){const st=document.getElementById('cp-status');if(st)st.innerHTML='<span style="color:var(--amber)">Add at least one key.</span>';return;}
  DD_CONN={anthropicKey:ak,alphacore:ac,ddengine:dd,autoops:ao};
  localStorage.setItem('dd_connection',JSON.stringify(DD_CONN));
  updateConnectUI();
  const st=document.getElementById('cp-status');if(st)st.innerHTML='<span style="color:var(--green)">✓ Saved</span>';
  setTimeout(()=>{const p=document.getElementById('connect-panel');if(p)p.style.display='none';},1400);
}
function clearConnect(){DD_CONN={};localStorage.removeItem('dd_connection');['cp-anthropic','cp-ac-url','cp-dd-url','cp-ao-url'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});updateConnectUI();}

}

// ── DD Engine integration — import deals ───────────────────────────────────────
async function loadFromDDEngine(){
  const url = DD_CONN.ddengine||DD_CONN.alphacore;
  if(!url){
    // Load from localStorage (DD Engine stores reviews there)
    const stored = [];
    try{
      const rev = JSON.parse(localStorage.getItem('dd_reviews_v2')||'[]');
      rev.filter(r=>r.source==='intake'&&r.type==='deal').forEach(r=>{
        if(!deals.find(d=>d.dd_key===r.key)){
          deals.unshift({
            id:'dd_'+r.key.slice(-8), name:r.companyName||r.formData?.co||r.formData?.company||'Untitled',
            strategy:(r.strategy||'pe').toLowerCase().replace(' ','_'),
            stage:'due_diligence', sector:r.formData?.sector||'', geography:r.formData?.geo||r.formData?.country||'',
            deal_size:r.formData?.size||r.formData?.acqPrice||0, equity_check:0, target_irr:r.formData?.irr||0,
            company_name:r.companyName||'', lead:'', summary:r.analysis?.headline||r.analysis?.summary||'',
            investment_thesis:r.formData?.thesis||'', key_risks:(r.analysis?.risk_flags||[]).map(f=>f.title).join(', '),
            source:'dd_engine', dd_key:r.key, dd_analysis:r.analysis,
          });
        }
      });
    }catch(e){}
    return;
  }
  try{
    const resp = await fetch(url+'/api/deals/?type=deal',{headers:{'Content-Type':'application/json'}});
    if(resp.ok){
      const data = await resp.json();
      data.forEach(r=>{
        if(!deals.find(d=>d.dd_key===r.key)){
          deals.unshift({id:'dd_'+r.key.slice(-8),name:r.companyName,strategy:(r.strategy||'pe').toLowerCase(),stage:'due_diligence',source:'dd_engine',dd_key:r.key,dd_analysis:r.analysis,company_name:r.companyName,lead:'',summary:r.analysis?.headline||'',deal_size:r.formData?.size||0});
        }
      });
    }
  }catch(e){}
}

// ── AutoOps transaction fetch ──────────────────────────────────────────────────
async function loadTransactions(){
  const url = DD_CONN.autoops;
  if(!url){
    // Use local storage transactions
    try{const t=JSON.parse(localStorage.getItem('ao_transactions')||'[]');if(t.length)transactions_cache=t;}catch(e){}
    return;
  }
  try{
    const resp=await fetch(url+'/api/transactions/');
    if(resp.ok)transactions_cache=await resp.json();
  }catch(e){}
}

// ── Send transaction to AutoOps ────────────────────────────────────────────────
async function pushTransaction(tx){
  // Save locally always
  const all=JSON.parse(localStorage.getItem('ao_transactions')||'[]');
  all.unshift(tx);
  localStorage.setItem('ao_transactions',JSON.stringify(all));
  transactions_cache=all;
  // Push to AutoOps if connected
  const url=DD_CONN.autoops;
  if(url){try{await fetch(url+'/api/transactions/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(tx)});}catch(e){}}
}

// ── Send IC email via Resend (if AlphaCore backend connected) ──────────────────
async function sendICEmail(deal, memo, action){
  const icMembers=members.filter(m=>m.ic_member);
  const subject=`[IC] ${action} — ${deal.name}`;
  const body=`Dear IC Member,\n\nThis is a notification that the following deal requires your action:\n\nDeal: ${deal.name}\nStrategy: ${STRAT_LBL[deal.strategy]||deal.strategy}\nAmount: $${(memo.amount||0).toLocaleString()}\n\nAction required: ${action}\n\nPlease log into AlphaCore to cast your vote.\n\nPrime Alpha Securities\nops@primealphasecurities.com`;
  const url=DD_CONN.alphacore;
  if(!url){toast('IC email queued (AlphaCore offline — connect to send live)','#f59e0b');return;}
  try{
    await fetch(url+'/api/send-email/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({to:icMembers.map(m=>m.email),subject,body,from:'ops@primealphasecurities.com'})});
    toast(`IC email sent to ${icMembers.length} members`,'#1fc98a');
  }catch(e){toast('Email failed: '+e.message,'#f04166');}
}

// ── Render ─────────────────────────────────────────────────────────────────────
function setTab(t){state.tab=t;render();}

function render(){
  const main=document.getElementById('main-content');if(!main)return;
  // Update nav active state
  document.querySelectorAll('.nav-link').forEach(el=>{
    el.classList.toggle('active',el.dataset.tab===state.tab);
  });
  switch(state.tab){
    case 'dashboard':   main.innerHTML=renderDashboard();break;
    case 'deals':       main.innerHTML=renderDeals();break;
    case 'diligence':   main.innerHTML=renderDiligence();break;
    case 'committee':   main.innerHTML=renderCommittee();break;
    case 'portfolio':   main.innerHTML=renderPortfolio();break;
    case 'documents':   main.innerHTML=renderDocuments();break;
    case 'members':     main.innerHTML=renderMembers();break;
    default:            main.innerHTML=renderDashboard();
  }
  afterRender();
}

function afterRender(){
  // Close dropdowns on outside click
  document.onclick=function(e){
    if(!e.target.closest('.connect-btn')&&!e.target.closest('.connect-panel')){
      const p=document.getElementById('connect-panel');if(p)p.style.display='none';
    }
    if(!e.target.closest('.profile-avatar')&&!e.target.closest('#profile-dropdown')){
      const pd=document.getElementById('profile-dropdown');if(pd)pd.style.display='none';state.profileOpen=false;
    }
  };
}

// ── Dashboard ──────────────────────────────────────────────────────────────────
function renderDashboard(){
  const totalAUM=positions.reduce((s,p)=>s+p.current,0);
  const totalInv=positions.reduce((s,p)=>s+p.entry,0);
  const retPct=totalInv?((totalAUM-totalInv)/totalInv*100).toFixed(1):0;
  const activeDeals=deals.filter(d=>!['closed_won','closed_lost'].includes(d.stage)).length;
  const pendingIC=memos.filter(m=>m.status==='voting').length;
  const tx=transactions_cache;
  const totalDeployed=tx.filter(t=>t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0);

  return `
    <div class="page-header"><h1>Firm Dashboard</h1>
    <div class="page-sub">${new Date().toLocaleDateString('en-GB',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div></div>
    <div class="stat-grid">
      <div class="stat-card blue"><div class="stat-lbl">Portfolio AUM</div><div class="stat-val">$${(totalAUM/1e6).toFixed(2)}M</div><div class="stat-sub">↑ ${retPct}% blended return</div></div>
      <div class="stat-card green"><div class="stat-lbl">Active Deals</div><div class="stat-val">${activeDeals}</div><div class="stat-sub">across ${[...new Set(deals.filter(d=>!['closed_won','closed_lost'].includes(d.stage)).map(d=>d.strategy))].length} strategies</div></div>
      <div class="stat-card amber"><div class="stat-lbl">Pending IC</div><div class="stat-val">${pendingIC}</div><div class="stat-sub">memo${pendingIC!==1?'s':''} awaiting vote</div></div>
      <div class="stat-card purple"><div class="stat-lbl">Capital Deployed</div><div class="stat-val">$${(totalDeployed/1e6).toFixed(2)}M</div><div class="stat-sub">from AutoOps transactions</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px">
      <div class="card"><div class="card-title">Deal Pipeline</div>
        ${['sourcing','screening','due_diligence','ic_review','negotiation'].map(stage=>{
          const count=deals.filter(d=>d.stage===stage).length;
          return count?`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px">
            <span>${tag(STAGE_LBL[stage],STAGE_COLOR[stage])}</span>
            <span style="font-weight:600">${count} deal${count!==1?'s':''}</span>
          </div>`:'';
        }).join('')}
      </div>
      <div class="card"><div class="card-title">Recent Transactions</div>
        ${transactions_cache.length?transactions_cache.slice(0,5).map(t=>`
          <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px">
            <span style="color:var(--muted);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.desc||t.description||''}</span>
            <span style="font-weight:700;color:${t.amount>=0?'var(--green)':'var(--red)'}">${t.amount>=0?'+':''}$${Math.abs(t.amount).toLocaleString()}</span>
          </div>`).join('')
        :'<div style="color:var(--muted);font-size:12px;padding:12px 0">No transactions. Connect AutoOps to see live data.</div>'}
      </div>
    </div>`;

      ${!['closed_won','closed_lost'].includes(d.stage)?`<button class="btn-g" onclick="closeDeal('${d.id}')">✓ Close deal</button>`:''}

function advanceDeal(id){
  const d=deals.find(x=>x.id===id);if(!d)return;
  const order=['sourcing','screening','due_diligence','ic_review','negotiation','closed_won'];
  const idx=order.indexOf(d.stage);
  if(idx<order.length-1){
    d.stage=order[idx+1];
    if(d.stage==='ic_review'){sendToIC(id);} // auto notify IC
    render();toast('Deal advanced to '+STAGE_LBL[d.stage],'#1fc98a');
  }
}

async function sendToIC(id){
  const d=deals.find(x=>x.id===id);if(!d)return;
  const memo=memos.find(m=>m.deal_id===id)||{deal:d.name,amount:d.deal_size,deal_id:id};
  await sendICEmail(d,memo,'IC Review Required');
  closeModal();
}

function closeDeal(id){
  const d=deals.find(x=>x.id===id);if(!d)return;
  closeModal();
  const type=prompt('Close type: enter "acquisition" or "sale"');
  if(!type)return;
  const t=type.trim().toLowerCase();
  if(t!=='acquisition'&&t!=='sale'){toast('Please enter acquisition or sale','#f04166');return;}
  const amtStr=prompt('Enter deal amount (USD):');
  const amt=parseFloat(amtStr)||d.deal_size||0;
  d.stage='closed_won';d.closed_type=t;d.closed_amount=amt;
  // Push transaction to AutoOps
  const tx={
    date:new Date().toISOString().slice(0,10),
    desc:`Deal closed: ${d.name} — ${t.charAt(0).toUpperCase()+t.slice(1)}`,
    amount:t==='acquisition'?-amt:amt,
    type:'deal_close',status:'posted',auto:false,currency:'USD',
    deal_id:id,deal_name:d.name,strategy:d.strategy,closed_type:t
  };
  pushTransaction(tx).then(()=>toast('Transaction pushed to AutoOps','#1fc98a'));
  // Add to positions if acquisition
  if(t==='acquisition'){
    positions.push({id:'p_'+id,name:d.company_name||d.name,strategy:d.strategy,entry:amt,current:amt,entry_date:new Date().toISOString().slice(0,10),currency:'USD'});
  }
  sendICEmail(d,{deal:d.name,amount:amt},'Deal Closed — '+type.toUpperCase());
  render();toast('Deal closed: '+d.name+' ('+t+')','#1fc98a');
}

function toggleDDItem(dealId,itemId){

async function castVote(memoId,member,vote){
  const memo=memos.find(m=>m.id===memoId);if(!memo)return;
  const v=memo.votes.find(v=>v.member===member);if(!v)return;
  v.vote=vote;
  const rationale=prompt('Add rationale (optional):');
  if(rationale)v.rationale=rationale;
  const approved=memo.votes.filter(v=>v.vote==='approve').length;
  const quorum=Math.ceil(memo.votes.length/2)+1;
  if(approved>=quorum){memo.status='approved';toast('Quorum reached — memo approved!','#1fc98a');}
  render();toast('Vote recorded: '+vote,'#1fc98a');
}

async function sendMemoEmail(memoId){
  const memo=memos.find(m=>m.id===memoId);if(!memo)return;
  const deal=deals.find(d=>d.id===memo.deal_id)||{name:memo.deal};
  await sendICEmail(deal,memo,'Vote Reminder');
}

    <div class="card">
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead><tr style="border-bottom:2px solid var(--border)">${['Document','Type','Deal','Uploaded','Size','Status',''].map(h=>`<th style="text-align:left;padding:8px;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.07em">${h}</th>`).join('')}</tr></thead>
        <tbody>${documents_repo.map(doc=>`
          <tr style="border-bottom:1px solid var(--border)">
            <td style="padding:10px 8px;font-weight:600;max-width:220px">
              <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${doc.name}">${doc.name}</div>
            </td>
            <td style="padding:10px 8px">${tag(typeLabels[doc.type]||doc.type,typeColors[doc.type]||'#5a6787')}</td>
            <td style="padding:10px 8px;color:var(--muted)">${doc.deal||'—'}</td>
            <td style="padding:10px 8px;color:var(--muted)">${doc.uploaded}</td>
            <td style="padding:10px 8px;color:var(--muted)">${doc.size}</td>
            <td style="padding:10px 8px">${tag(doc.status,doc.status==='reviewed'?'#1fc98a':'#f59e0b')}</td>
            <td style="padding:10px 8px">
              ${doc.b64?`<button onclick="viewDoc('${doc.id}')" style="font-size:11px;padding:4px 8px;background:var(--blue-d);color:var(--blue);border:1px solid rgba(74,124,255,.3);border-radius:var(--r);cursor:pointer">View</button>`
              :`<span style="font-size:10px;color:var(--muted)">No preview</span>`}
            </td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}
function handleDocUpload(files){
  Array.from(files).forEach(f=>{
    const reader=new FileReader();
    reader.onload=e=>{
      documents_repo.unshift({id:'d_'+Date.now(),name:f.name,type:'other',deal:'',uploaded:new Date().toLocaleDateString('en-GB'),size:(f.size/1024).toFixed(0)+' KB',status:'pending',b64:e.target.result.split(',')[1],mime:f.type});
      render();toast('Uploaded: '+f.name,'#1fc98a');
    };
    reader.readAsDataURL(f);
  });
}
function viewDoc(id){
  const doc=documents_repo.find(d=>d.id===id);if(!doc||!doc.b64)return;
  const url='data:'+doc.mime+';base64,'+doc.b64;
  window.open(url,'_blank');
}

// ── Team & Access ──────────────────────────────────────────────────────────────
function renderMembers(){
  const tabs=['Members','Pending Requests','Add Member'];
  return `
    <div class="page-header"><h1>Team &amp; Access</h1><div class="page-sub">${members.length} active members · ${joinRequests.length} pending</div></div>
    <div style="display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border)">
      ${tabs.map((t,i)=>`<button onclick="state.memberTab=${i};render()" style="padding:8px 18px;font-size:13px;background:none;border:none;cursor:pointer;color:${state.memberTab===i?'var(--blue)':'var(--muted)'};border-bottom:2px solid ${state.memberTab===i?'var(--blue)':'transparent'};font-weight:${state.memberTab===i?'600':'400'}">${t}</button>`).join('')}
    </div>
    ${state.memberTab===0?renderMembersList():state.memberTab===1?renderJoinRequests():renderAddMember()}`;
}

function canManage(manager, targetMember){
  // CTO/CIO/COO/CRO/Audit Manager can manage anyone
  if(FIRM_ROLES.includes(manager.role))return true;
  // MD/VP can manage below them in same team
  if(['Managing Director','Vice President'].includes(manager.role)&&manager.team===targetMember.team){
    const rank={'Managing Director':1,'Vice President':2,'Associate':3,'Analyst':4};
    return (rank[manager.role]||99)<(rank[targetMember.role]||99);
  }
  // Architect can manage Tech & Support + all R&D
  if(manager.role==='Architect'&&(targetMember.team==='Technology & Support'||targetMember.team==='R&D'))return true;
  return false;
}

function renderMembersList(){
  return members.map(m=>`
    <div class="card" style="display:flex;align-items:center;gap:16px;padding:14px;margin-bottom:8px">
      <div style="width:44px;height:44px;border-radius:50%;background:${m.color};display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0">${m.initials}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:700">${m.name}</div>
        <div style="font-size:12px;color:var(--muted)">${m.email}</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:5px">
          ${tag(m.role,'#4a7cff')}
          ${m.team?tag(m.team,'#5a6787'):''}
          ${m.ic_member?'<span class="tag" style="background:rgba(74,124,255,.08);color:var(--blue);border:1px solid rgba(74,124,255,.2);font-size:9px">IC</span>':''}
        </div>
      </div>
      <div style="font-size:11px;color:var(--muted);flex-shrink:0">Joined ${m.joined}</div>
      ${canManage(CURRENT_USER_AC,m)&&m.id!==CURRENT_USER_AC.id?`<button onclick="removeMember('${m.id}')" style="font-size:11px;padding:5px 10px;background:rgba(244,63,94,.08);color:var(--red);border:1px solid rgba(244,63,94,.2);border-radius:var(--r);cursor:pointer;flex-shrink:0">Remove</button>`:''}
    </div>`).join('');
}

function removeMember(id){
  const m=members.find(x=>x.id===id);if(!m)return;
  if(!confirm('Move '+m.name+' back to pending join request?'))return;
  joinRequests.push({id:'jr_'+id,name:m.name,email:m.email,message:'Returned to pending by '+CURRENT_USER_AC.name,initials:m.initials,color:m.color});
  const idx=members.indexOf(m);if(idx>-1)members.splice(idx,1);
  render();toast(m.name+' moved to pending','#f59e0b');
}

function renderJoinRequests(){
  if(!joinRequests.length)return'<div style="color:var(--muted);font-size:13px">No pending join requests.</div>';
  return joinRequests.map(r=>`
    <div class="card" style="display:flex;align-items:center;gap:14px;padding:14px;margin-bottom:8px">
      <div style="width:44px;height:44px;border-radius:50%;background:${r.color};display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0">${r.initials}</div>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:700">${r.name}</div>
        <div style="font-size:12px;color:var(--muted)">${r.email}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">${r.message}</div>
      </div>
      ${FIRM_ROLES.includes(CURRENT_USER_AC.role)?`<button onclick="approveJoin('${r.id}')" style="font-size:11px;padding:6px 12px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);cursor:pointer;font-weight:600">Approve</button>`:''}
    </div>`).join('');
}

function approveJoin(id){
  const r=joinRequests.find(x=>x.id===id);if(!r)return;
  // Show team/role assignment modal
  const m=document.getElementById('modal');if(!m)return;
  m.style.display='flex';
  document.getElementById('modal-body').innerHTML=renderAssignModal(r);
}

function renderAssignModal(r){
  const teamOpts=Object.keys(TEAMS).map(t=>`<option value="${t}">${t}</option>`).join('');
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h2>Assign ${r.name}</h2>
      <button onclick="closeModal()" style="font-size:20px;color:var(--muted);background:none;border:none;cursor:pointer">&#10005;</button>
    </div>
    <div style="display:grid;gap:14px">
      <div><label class="field-label">Team or Firm-level role</label>
        <select id="assign-team" class="field-input" onchange="updateRoleOptions()">
          <option value="">— Firm-level (no team) —</option>
          ${teamOpts}
        </select>
      </div>
      <div><label class="field-label">Role</label>
        <select id="assign-role" class="field-input">
          ${FIRM_ROLES.map(r=>`<option>${r}</option>`).join('')}
        </select>
      </div>
      <div><label class="field-label">IC Member</label>
        <select id="assign-ic" class="field-input"><option value="false">No</option><option value="true">Yes</option></select>
      </div>
      <div><label class="field-label">Email</label><input id="assign-email" class="field-input" value="${r.email}"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:18px">
      <button class="btn-p" onclick="confirmAssign('${r.id}')">Add to team</button>
      <button class="btn-g" onclick="closeModal()">Cancel</button>
    </div>`;
}

function updateRoleOptions(){
  const team=document.getElementById('assign-team')?.value;
  const roleEl=document.getElementById('assign-role');if(!roleEl)return;
  const roles=team?TEAMS[team]:FIRM_ROLES;
  roleEl.innerHTML=(roles||FIRM_ROLES).map(r=>`<option>${r}</option>`).join('');
}

function confirmAssign(reqId){
  const r=joinRequests.find(x=>x.id===reqId);if(!r)return;
  const team=document.getElementById('assign-team')?.value||null;
  const role=document.getElementById('assign-role')?.value||'Analyst';
  const ic=document.getElementById('assign-ic')?.value==='true';
  const email=document.getElementById('assign-email')?.value||r.email;
  const newMember={id:'m_'+Date.now(),name:r.name,email,role,team:team||null,initials:r.initials,color:r.color,joined:new Date().toISOString().slice(0,10),ic_member:ic,firm_role:FIRM_ROLES.includes(role)};
  members.push(newMember);
  const idx=joinRequests.indexOf(r);if(idx>-1)joinRequests.splice(idx,1);
  closeModal();render();toast(r.name+' added as '+role+(team?' in '+team:''),'#1fc98a');
}

function renderAddMember(){
  const teamOpts=Object.keys(TEAMS).map(t=>`<option value="${t}">${t}</option>`).join('');
  return `
    <div class="card" style="max-width:500px">
      <div style="font-size:14px;font-weight:700;margin-bottom:16px">Invite new member</div>
      <div style="display:grid;gap:12px">
        <div><label class="field-label">Full name *</label><input id="add-name" class="field-input" placeholder="Jane Smith"></div>
        <div><label class="field-label">Email *</label><input id="add-email" type="email" class="field-input" placeholder="jane@company.com"></div>
        <div><label class="field-label">Team (or leave blank for firm-level)</label>
          <select id="add-team" class="field-input" onchange="updateAddRoleOptions()">
            <option value="">— Firm-level —</option>${teamOpts}
          </select>
        </div>
        <div><label class="field-label">Role</label>
          <select id="add-role" class="field-input">${FIRM_ROLES.map(r=>`<option>${r}</option>`).join('')}</select>
        </div>
        <div><label class="field-label">IC Member</label>
          <select id="add-ic" class="field-input"><option value="false">No</option><option value="true">Yes</option></select>
        </div>
      </div>
      <button class="btn-p" onclick="addMemberDirectly()" style="margin-top:16px">Add member</button>
    </div>`;
}
function updateAddRoleOptions(){
  const team=document.getElementById('add-team')?.value;
  const roleEl=document.getElementById('add-role');if(!roleEl)return;
  const roles=team?TEAMS[team]:FIRM_ROLES;
  roleEl.innerHTML=(roles||FIRM_ROLES).map(r=>`<option>${r}</option>`).join('');
}
function addMemberDirectly(){
  const name=document.getElementById('add-name')?.value?.trim();
  const email=document.getElementById('add-email')?.value?.trim();
  if(!name||!email){toast('Name and email are required','#f04166');return;}
  const team=document.getElementById('add-team')?.value||null;
  const role=document.getElementById('add-role')?.value||'Analyst';
  const ic=document.getElementById('add-ic')?.value==='true';
  const initials=name.split(' ').map(w=>w[0]||'').slice(0,2).join('').toUpperCase();
  const colors=['#4a7cff','#1fc98a','#f59e0b','#a78bfa','#f04166','#c9a84c'];
  const color=colors[members.length%colors.length];
  members.push({id:'m_'+Date.now(),name,email,role,team,initials,color,joined:new Date().toISOString().slice(0,10),ic_member:ic,firm_role:FIRM_ROLES.includes(role)});
  render();toast(name+' added','#1fc98a');
}

// ── Init ───────────────────────────────────────────────────────────────────────
(function init(){
  try{
    applyTheme(CUR_THEME);
    applyLang(CUR_LANG);
    updateConnectUI();
    initSidebar();
    // Load DD Engine deals and AutoOps transactions
    loadFromDDEngine().then(()=>{ loadTransactions().then(render); }).catch(()=>render());
  }catch(e){
    console.error('AlphaCore init error:',e);
    const mc=document.getElementById('main-content');
    if(mc)mc.innerHTML='<div style="color:#f04166;padding:20px;font-family:monospace;font-size:12px">Init error: '+e.message+'<br>'+(e.stack||'')+'</div>';
  }
})();

</script>
</body>
</html>
