<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AlphaCore — Demo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0e17;--surf:#111520;--surf2:#161b2a;--border:#1e2540;
  --blue:#3b6bff;--blue-d:rgba(59,107,255,.12);--green:#2dd4a0;
  --red:#ff4d6a;--amber:#f8a742;--gold:#f8ce56;--purple:#a78bfa;
  --text:#e2e8f8;--muted:#6b7599;--dim:#3a4263;
  --ff:'Segoe UI',system-ui,sans-serif;--ffm:'Consolas',monospace;
  --r:6px;--rl:10px;
}
html,body{height:100%;font-family:var(--ff);background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
input,select,textarea{font-family:inherit;color:var(--text);background:var(--surf2);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;outline:none;width:100%;font-size:13px}
input:focus,select:focus{border-color:var(--blue)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .2s ease both}
.app{display:flex;height:100vh}
/* sidebar */
.sidebar{width:220px;background:var(--surf);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.sb-logo .name{font-family:var(--ffm);font-size:11px;font-weight:700;color:var(--blue);letter-spacing:.15em;text-transform:uppercase}
.sb-logo .co{font-size:11px;color:var(--text);font-weight:600;margin-top:3px}
.sb-logo .sub{font-size:10px;color:var(--muted);margin-top:1px}
nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-btn{display:flex;align-items:center;gap:9px;width:100%;text-align:left;padding:8px 11px;border-radius:var(--r);margin-bottom:2px;font-size:13px;transition:all .12s;border-left:2px solid transparent}
.nav-btn:hover{background:var(--surf2);color:var(--text)}
.nav-btn.active{color:var(--blue);background:var(--blue-d);border-left-color:var(--blue);font-weight:600}
.nav-btn .ic{font-size:14px;width:18px;text-align:center}
.sb-user{padding:10px 10px 14px;border-top:1px solid var(--border)}
.user-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r)}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.user-name{font-size:12px;font-weight:600}
.user-role{font-size:10px;color:var(--muted)}
/* main */
main{flex:1;overflow-y:auto;padding:28px 32px}
/* cards */
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);padding:20px;margin-bottom:16px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat{background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);padding:16px;border-top:2px solid var(--border)}
.stat.blue{border-top-color:var(--blue)}
.stat.green{border-top-color:var(--green)}
.stat.amber{border-top-color:var(--amber)}
.stat.red{border-top-color:var(--red)}
.stat-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.stat-val{font-family:var(--ffm);font-size:24px;font-weight:600;line-height:1}
.stat-sub{font-size:11px;color:var(--muted);margin-top:5px}
h1{font-size:22px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px}
.page-sub{color:var(--muted);font-size:13px;margin-bottom:24px}
/* tags */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
/* buttons */
.btn-p{background:var(--blue);color:#fff;padding:7px 16px;border-radius:var(--r);font-weight:600;font-size:12px;white-space:nowrap}
.btn-p:hover{opacity:.85}
.btn-g{background:var(--surf2);color:var(--muted);border:1px solid var(--border);padding:6px 14px;border-radius:var(--r);font-size:12px}
.btn-d{background:rgba(255,77,106,.1);color:var(--red);border:1px solid rgba(255,77,106,.3);padding:6px 12px;border-radius:var(--r);font-size:12px}
/* table */
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:7px 12px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border)}
td{padding:11px 12px;font-size:13px;border-bottom:1px solid var(--border)}
tr:hover td{background:var(--surf2)}
/* kanban */
.kanban{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px}
.kanban-col{min-width:220px;flex:0 0 220px}
.kanban-hdr{display:flex;align-items:center;gap:7px;margin-bottom:10px}
.kanban-hdr .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.kanban-hdr .lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.kanban-hdr .cnt{font-size:11px;color:var(--dim);margin-left:auto}
.deal-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);padding:13px;cursor:pointer;margin-bottom:8px;transition:box-shadow .15s;border-left:3px solid}
.deal-card:hover{box-shadow:0 4px 20px rgba(59,107,255,.15)}
/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);padding:28px;max-width:580px;width:100%;max-height:90vh;overflow-y:auto}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
/* checklist */
.check-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r);cursor:pointer;margin-bottom:3px;border:1px solid var(--border);transition:all .15s}
.check-item:hover{background:var(--surf2)}
.check-item.done{background:rgba(45,212,160,.05);border-color:rgba(45,212,160,.2)}
.checkbox{width:18px;height:18px;border-radius:4px;border:2px solid var(--dim);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:700;transition:all .15s}
.checkbox.done{background:var(--green);border-color:var(--green);color:#000}
/* progress bar */
.prog-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .5s}
/* two col */
.two-col{display:grid;grid-template-columns:1.3fr 1fr;gap:16px}
/* vote */
.vote-row{display:flex;gap:10px;margin-bottom:12px}
.vote-box{text-align:center;padding:12px 16px;border-radius:var(--r);border:1px solid var(--border);flex:1}
.vote-num{font-family:var(--ffm);font-size:22px;font-weight:600}
.vote-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-top:2px}
/* member row */
.member-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.mem-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
/* toast */
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:7px}
.toast{background:var(--surf);border-left:3px solid var(--green);padding:10px 16px;border-radius:var(--r);font-size:13px;animation:fadeUp .2s ease both;border:1px solid rgba(45,212,160,.3)}
.toast.err{border-left-color:var(--red);border-color:rgba(255,77,106,.3)}
.lbl{display:block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;font-weight:700}
input[type=text],input[type=email],input[type=number],textarea,select{margin-bottom:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
</style>
</head>

function renderPage(){

// ── Due Diligence ─────────────────────────────────────────────────────────────
function renderDiligence(){
  const ddDeals=deals.filter(d=>d.stage==='due_diligence'||d.stage==='ic_review');
  const sel=state.selectedDeal||ddDeals[0]?.id;
  const items=ddItems[sel]||[];
  const done=items.filter(i=>i.done).length;
  const pct=items.length?Math.round(done/items.length*100):0;
  const cats=[...new Set(items.map(i=>i.cat))];
  return `
    <h1>Due Diligence</h1>
    <div class="page-sub">Checklists and findings per deal</div>
    <div style="display:grid;grid-template-columns:260px 1fr;gap:18px;height:calc(100vh - 160px)">
      <div class="card" style="overflow-y:auto">
        <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px">Deals in DD</div>
        ${ddDeals.map(d=>`
          <div onclick="selectDeal('${d.id}')" style="padding:10px 12px;border-radius:var(--r);cursor:pointer;margin-bottom:4px;background:${sel===d.id?'var(--blue-d)':'none'};border-left:2px solid ${sel===d.id?'var(--blue)':'transparent'};transition:all .12s">
            <div style="font-weight:600;font-size:13px">${d.name}</div>
            <div style="font-size:11px;color:var(--muted)">${STRAT_LBL[d.strategy]}</div>
          </div>`).join('')}
      </div>
      <div class="card" style="overflow-y:auto">
        ${sel?`
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
            <div>
              <h3 style="font-size:16px;font-weight:700">${deals.find(d=>d.id===sel)?.name||''}</h3>
              <div style="font-size:12px;color:var(--muted);margin-top:2px">${items.length} items · ${pct}% complete</div>
            </div>
            <div style="text-align:right">
              <div style="font-family:var(--ffm);font-size:24px;font-weight:600;color:${pct===100?'var(--green)':'var(--blue)'}">${pct}%</div>
              <div class="prog-bar" style="width:80px;margin-top:4px"><div class="prog-fill" style="width:${pct}%;background:${pct===100?'var(--green)':'var(--blue)'}"></div></div>
            </div>
          </div>
          ${cats.map(cat=>`
            <div style="margin-bottom:18px">
              <div style="display:flex;align-items:center;gap:7px;margin-bottom:8px">
                <div style="width:8px;height:8px;border-radius:50%;background:var(--blue)"></div>
                <span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em">${cat}</span>
              </div>
              ${items.filter(i=>i.cat===cat).map(i=>`
                <div class="check-item ${i.done?'done':''}" onclick="toggleItem('${sel}','${i.id}')">
                  <div class="checkbox ${i.done?'done':''}">${i.done?'✓':''}</div>
                  <span style="font-size:13px;flex:1;text-decoration:${i.done?'line-through':'none'};color:${i.done?'var(--muted)':'var(--text)'}">${i.title}</span>
                  ${tag(i.priority,i.priority==='high'?'#ff4d6a':i.priority==='medium'?'#f8a742':'#6b7599')}
                </div>`).join('')}
            </div>`).join('')}
        `:'<div style="color:var(--muted);padding:40px;text-align:center">No deals in due diligence</div>'}
      </div>
    </div>`;
}

// ── Portfolio ─────────────────────────────────────────────────────────────────
function renderPortfolio(){
  const total_i=positions.reduce((s,p)=>s+p.entry,0);

  return `
    <h1>Portfolio Monitoring</h1>

    <div class="stat-grid">
      <div class="stat blue"><div class="stat-lbl">Total AUM</div><div class="stat-val" style="color:var(--blue)">${fmt$(total_c)}</div><div class="stat-sub">Current NAV</div></div>
      <div class="stat"><div class="stat-lbl">Total Invested</div><div class="stat-val">${fmt$(total_i)}</div></div>
      <div class="stat green"><div class="stat-lbl">Unrealised Gain</div><div class="stat-val" style="color:var(--green)">${fmt$(total_c-total_i)}</div><div class="stat-sub">▲ ${((total_c-total_i)/total_i*100).toFixed(1)}%</div></div>
      <div class="stat"><div class="stat-lbl">Positions</div><div class="stat-val">${positions.length}</div></div>

              <td>${tag(STRAT_LBL[p.strategy],STRAT_COLOR[p.strategy])}</td>

      </table>

        </div>
        <div><label class="lbl">Summary</label><textarea id="nd-summary" style="min-height:72px;margin-bottom:14px" placeholder="Brief deal description"></textarea></div>
        <div style="display:flex;gap:10px">
          <button class="btn-p" onclick="createDeal()">Create Deal</button>
          <button class="btn-g" onclick="closeModal()">Cancel</button>
        </div>
      </div>
    </div>`;
}

// ── Charts ────────────────────────────────────────────────────────────────────
function afterRender(){
  if(state.tab==='dashboard'){
    // Pipeline chart
    const pctx=document.getElementById('chart-pipeline');
    if(pctx){
      if(state.charts.pipeline) state.charts.pipeline.destroy();
      const byStrat={};
      deals.forEach(d=>{byStrat[d.strategy]=(byStrat[d.strategy]||0)+1});
      state.charts.pipeline=new Chart(pctx,{type:'bar',data:{
        labels:Object.keys(byStrat).map(k=>STRAT_LBL[k]),
        datasets:[{data:Object.values(byStrat),backgroundColor:Object.keys(byStrat).map(k=>STRAT_COLOR[k]),borderRadius:4}]
      },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{x:{grid:{display:false},ticks:{color:'#6b7599',font:{size:11}}},
                y:{grid:{color:'#1e2540'},ticks:{color:'#6b7599',font:{size:11}}}}}});
    }
    // AUM pie
    const actx=document.getElementById('chart-aum');
    if(actx){
      if(state.charts.aum) state.charts.aum.destroy();
      const byS={};
      positions.forEach(p=>{byS[p.strategy]=(byS[p.strategy]||0)+p.current});
      state.charts.aum=new Chart(actx,{type:'doughnut',data:{
        labels:Object.keys(byS).map(k=>STRAT_LBL[k]),
        datasets:[{data:Object.values(byS),backgroundColor:Object.keys(byS).map(k=>STRAT_COLOR[k]),borderWidth:0,hoverOffset:4}]
      },options:{responsive:true,maintainAspectRatio:false,cutout:'60%',
        plugins:{legend:{position:'bottom',labels:{color:'#6b7599',font:{size:11},boxWidth:10}}}}});
    }
  }
  if(state.tab==='portfolio'){
    const nctx=document.getElementById('chart-nav');
    if(nctx){
      if(state.charts.nav) state.charts.nav.destroy();
      state.charts.nav=new Chart(nctx,{type:'line',data:{
        labels:['Jun 24','Jul 24','Aug 24','Sep 24','Oct 24','Nov 24','Dec 24'],
        datasets:[{label:'AUM',data:[2100000,2250000,2600000,2720000,2840000,3100000,3693000],
          borderColor:'#3b6bff',backgroundColor:'rgba(59,107,255,0.1)',tension:.4,fill:true,pointRadius:3,pointBackgroundColor:'#3b6bff'}]
      },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{x:{grid:{display:false},ticks:{color:'#6b7599',font:{size:11}}},
                y:{grid:{color:'#1e2540'},ticks:{color:'#6b7599',font:{size:11},callback:v=>'$'+Math.round(v/1000)+'k'}}}}});
    }
  }
}

// ── Actions ───────────────────────────────────────────────────────────────────
window.setTab=t=>{state.tab=t;state.modal=null;render()};
window.openDeal=id=>{state.modal='deal';state.modalData=deals.find(d=>d.id===id);render()};
window.openNewDeal=()=>{state.modal='newdeal';render()};
window.closeModal=()=>{state.modal=null;state.modalData=null;render()};
window.selectDeal=id=>{state.selectedDeal=id;render()};
window.selectMemo=id=>{state.selectedMemo=id;render()};

window.toggleItem=(dealId,itemId)=>{
  if(!ddItems[dealId]) return;
  const item=ddItems[dealId].find(i=>i.id===itemId);
  if(item){item.done=!item.done;toast(item.done?'Item marked complete':'Item marked pending');render();}
};

window.advanceStage=(id,newStage)=>{
  const d=deals.find(x=>x.id===id);
  if(d){d.stage=newStage;toast(`${d.name} → ${STAGE_LBL[newStage]}`);closeModal();render();}
};

window.castVote=(memoId,vote)=>{
  const memo=memos.find(m=>m.id===memoId);
  const myVote=memo.votes.find(v=>v.member===USER.name);
  if(myVote){
    myVote.vote=vote;
    myVote.rationale=vote==='approve'?'Reviewed and approved.':'Further analysis required.';
    toast(`Vote cast: ${vote}`);
    const approves=memo.votes.filter(v=>v.vote==='approve').length;
    const total=memo.votes.length;
    if(approves>=Math.ceil(total/2)+1||memo.votes.every(v=>v.vote!=='pending')){
      memo.status=approves>memo.votes.filter(v=>v.vote==='reject').length?'approved':'rejected';
      toast(`Memo ${memo.status.toUpperCase()}!`,memo.status==='approved'?'ok':'err');
    }
    render();
  }
};

window.createDeal=()=>{
  const name=document.getElementById('nd-name').value.trim();
  if(!name){toast('Deal name required','err');return;}
  const newDeal={
    id:'d'+Date.now(),name,
    strategy:document.getElementById('nd-strat').value,
    stage:document.getElementById('nd-stage').value,
    sector:document.getElementById('nd-sector').value,
    geography:document.getElementById('nd-geo').value,
    deal_size:parseFloat(document.getElementById('nd-size').value)||null,
    target_irr:parseFloat(document.getElementById('nd-irr').value)||null,
    company_name:document.getElementById('nd-co').value,
    summary:document.getElementById('nd-summary').value,
    investment_thesis:'',key_risks:'',lead:USER.name,
  };
  deals.push(newDeal);
  toast(`Deal created: ${name}`);
  closeModal();
};

window.approveRequest=(i,name)=>{
  const role=document.getElementById('role-sel-'+i)?.value||'Analyst';
  members.push({name,email:joinRequests[i].email,role,initials:joinRequests[i].initials,color:joinRequests[i].color,joined:new Date().toISOString().slice(0,10)});
  joinRequests.splice(i,1);
  toast(`${name} approved as ${role}`);
  render();
};

window.rejectRequest=(i,name)=>{
  joinRequests.splice(i,1);
  toast(`Request from ${name} rejected`,'err');
  render();
};

window.setMemberTab=i=>{
  document.querySelectorAll('.mtab').forEach((b,j)=>{
    b.style.color=j===i?'var(--blue)':'var(--muted)';
    b.style.borderBottomColor=j===i?'var(--blue)':'transparent';
    b.style.fontWeight=j===i?'600':'400';
  });
};

// ── Init ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
