<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Portfolio Monitor — Alerts</title><link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,300&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07090f;--surf:#0d1119;--surf2:#121722;--surf3:#171e2d;--border:#1a2238;--blue:#4a7cff;--blue-d:rgba(74,124,255,.1);--green:#1fc98a;--red:#f04166;--amber:#f59e0b;--gold:#c9a84c;--purple:#a78bfa;--text:#dde4f5;--muted:#566382;--dim:#1c2540;--ff:'Figtree',sans-serif;--ffm:'DM Mono',monospace;--ffd:'Fraunces',serif;--r:6px;--rl:10px}
html[data-theme=light]{--bg:#f0f2f7;--surf:#fff;--surf2:#f4f6fb;--surf3:#edf0f7;--border:#dde1ed;--blue:#2563eb;--blue-d:rgba(37,99,235,.08);--green:#16a34a;--red:#dc2626;--amber:#d97706;--gold:#b45309;--purple:#7c3aed;--text:#0f172a;--muted:#64748b;--dim:#e2e8f0}
html,body{min-height:100%;font-family:var(--ff);background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
.fu{animation:fadeUp .2s ease both}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap}
.topnav{background:var(--surf);border-bottom:1px solid var(--border);padding:0 18px;height:48px;display:flex;align-items:center;position:sticky;top:0;z-index:100;gap:0}
.nav-brand{font-family:var(--ffm);font-size:10px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--acc,var(--blue));margin-right:6px;white-space:nowrap}
.nav-sep{color:var(--border);margin:0 6px;font-size:14px}
.nav-mod{font-size:11px;color:var(--muted);margin-right:16px;white-space:nowrap}
.nav-links{display:flex;align-items:center;gap:1px;flex:1;overflow-x:auto}
.nav-item{padding:5px 10px;border-radius:var(--r);font-size:12px;font-weight:500;color:var(--muted);transition:all .12s;white-space:nowrap}
.nav-item:hover{color:var(--text);background:var(--surf2)}
.nav-item.active{color:var(--acc,var(--blue));background:color-mix(in srgb,var(--acc,var(--blue)) 10%,transparent);font-weight:600}
.nav-right{display:flex;align-items:center;gap:7px;margin-left:8px;flex-shrink:0}
.tl-btn{padding:4px 10px;border-radius:var(--r);border:1px solid var(--border);background:var(--surf2);cursor:pointer;font-size:11px;color:var(--muted);transition:all .12s}
.tl-btn:hover{border-color:var(--acc,var(--blue));color:var(--text)}
.toolbar{padding:8px 18px;border-bottom:1px solid var(--border);background:var(--surf);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fpill{padding:3px 11px;border-radius:20px;border:1px solid var(--border);font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .12s}
.fpill:hover,.fpill.active{border-color:var(--acc,var(--blue));color:var(--acc,var(--blue));background:color-mix(in srgb,var(--acc,var(--blue)) 8%,transparent)}
.btn{padding:6px 14px;border-radius:var(--r);font-size:12px;font-weight:700;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:5px;transition:opacity .15s;white-space:nowrap}
.btn:hover{opacity:.82}
.btn-s{padding:5px 12px;border-radius:var(--r);font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surf2);color:var(--text);transition:all .15s;white-space:nowrap}
.btn-s:hover{border-color:var(--acc,var(--blue));color:var(--acc,var(--blue))}
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--rl)}
.card-hd{padding:12px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-ttl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted)}
.main{padding:16px 18px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px}
.mbox{background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);padding:11px 13px}
.ml{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:4px}
.mv{font-family:var(--ffm);font-size:18px;font-weight:700}
.ms{font-size:10px;color:var(--muted);margin-top:2px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;padding:7px 12px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surf2)}
.tbl td{padding:8px 12px;border-bottom:1px solid var(--border)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--surf2)}
.nm{font-weight:700;color:var(--text)}
.num{font-family:var(--ffm);color:var(--text)}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:2000;align-items:center;justify-content:center}
.ov.open{display:flex}
.modal{background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:20px;width:480px;max-width:93vw;max-height:88vh;overflow-y:auto}
.mtitle{font-size:14px;font-weight:700;margin-bottom:13px;display:flex;align-items:center;justify-content:space-between}
.mx{font-size:19px;color:var(--muted);cursor:pointer;background:none;border:none;line-height:1}
.mx:hover{color:var(--text)}
.frow{margin-bottom:11px}
.fl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px;display:block}
.fi,.fs,.ft{width:100%;padding:7px 10px;background:var(--surf2);border:1px solid var(--border);border-radius:var(--r);font-size:12px;color:var(--text);font-family:var(--ff);outline:none;transition:border-color .15s}
.fi:focus,.fs:focus,.ft:focus{border-color:var(--acc,var(--blue))}
.ft{resize:vertical;min-height:64px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.toast{position:fixed;bottom:16px;right:16px;padding:10px 15px;border-radius:var(--rl);font-size:13px;font-weight:600;z-index:9999;opacity:0;transform:translateY(40px);transition:all .25s;pointer-events:none;color:#fff}
.toast.show{opacity:1;transform:translateY(0)}
.foot{text-align:center;padding:12px;border-top:1px solid rgba(201,168,76,.1);font-size:11px;color:var(--muted);margin-top:14px}
.foot span{color:var(--gold);font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.live{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block;margin-right:4px}
.shd{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin:16px 0 9px}
.pb{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;transition:width .6s ease}
:root{--acc:#f59e0b}</style></head><body><nav class="topnav">
<span class="nav-brand">PAS</span><span class="nav-sep">|</span><span class="nav-mod">Portfolio Monitor</span>
<div class="nav-links"><a class="nav-item" href="dashboard.html">📊 Dashboard</a><a class="nav-item" href="positions.html">📋 Positions</a><a class="nav-item" href="covenants.html">🔒 Covenants</a><a class="nav-item" href="fx.html">💱 FX</a><a class="nav-item active" href="alerts.html">🔔 Alerts</a></div>
<div class="nav-right"><a class="tl-btn" href="../index.html">← Roadmap</a><button class="tl-btn tb" onclick="toggleTheme()">&#9728; Light</button></div>
</nav>
<div class="toolbar">
  <div class="fpill active" onclick="fp(this,'all')">All</div>
  <div class="fpill" onclick="fp(this,'critical')">Critical</div>
  <div class="fpill" onclick="fp(this,'warning')">Warning</div>
  <div class="fpill" onclick="fp(this,'info')">Info</div>
  <div style="margin-left:auto;display:flex;gap:8px">
    <button class="btn-s" onclick="clearAll()">Clear All</button>
    <button class="btn" style="background:var(--acc);color:#000" onclick="addTestAlert()">+ Test Alert</button>
  </div>
</div>
<div class="main">
<div class="g4">
  <div class="mbox"><div class="ml">Active</div><div class="mv" style="color:var(--red)" id="m-al">7</div></div>
  <div class="mbox"><div class="ml">Critical</div><div class="mv" style="color:var(--red)" id="m-cr">2</div></div>
  <div class="mbox"><div class="ml">Warning</div><div class="mv" style="color:var(--amber)" id="m-wa">3</div></div>
  <div class="mbox"><div class="ml">Info</div><div class="mv" style="color:var(--blue)" id="m-in">2</div></div>
</div>
<div id="alertList" style="display:flex;flex-direction:column;gap:8px"></div>
</div>
<script>
let alerts=[
  {id:1,sev:'critical',msg:'DSCR covenant breach — Sahel Agro Credit (1.18x vs 1.25x)',src:'Covenant Monitor',time:'06:00',ack:false},
  {id:2,sev:'critical',msg:'XAF/USD spike overnight — MTM impact -$8.4K',src:'FX Monitor',time:'07:32',ack:false},
  {id:3,sev:'warning',msg:'TelecomPlus leverage at 3.8x approaching 4.0x limit',src:'Covenants',time:'06:00',ack:false},
  {id:4,sev:'warning',msg:'GreenPower SN construction delayed — IRR revised to 8.1%',src:'Portfolio',time:'09:15',ack:false},
  {id:5,sev:'warning',msg:'Capital call 4 — Famille Mbeki payment overdue',src:'Investor CRM',time:'10:00',ack:false},
  {id:6,sev:'info',msg:'Acme Manufacturing Q1 accounts received',src:'Document Inbox',time:'08:45',ack:false},
  {id:7,sev:'info',msg:'New deal scored: Cameroon Agri Holdings — score 82 PASS',src:'Deal Flow',time:'11:20',ack:false},
];
const SC={critical:'#f04166',warning:'#f59e0b',info:'#4a7cff'};
let filt='all';
function fp(el,f){filt=f;document.querySelectorAll('.fpill').forEach(p=>p.classList.remove('active'));el.classList.add('active');render();}
function render(){
  const list=alerts.filter(a=>filt==='all'||a.sev===filt);
  document.getElementById('alertList').innerHTML=list.map(a=>`
<div style="display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:var(--surf);border:1px solid var(--border);border-left:3px solid ${SC[a.sev]};border-radius:var(--rl)">
<div style="width:8px;height:8px;border-radius:50%;background:${SC[a.sev]};margin-top:5px;flex-shrink:0"></div>
<div style="flex:1"><div style="font-size:12px;font-weight:600;margin-bottom:3px">${a.msg}</div>
<div style="font-size:10px;color:var(--muted)">${a.src} · ${a.time} UTC</div></div>
<div style="display:flex;gap:6px;flex-shrink:0">
${!a.ack?`<button class="btn-s" style="font-size:11px;padding:3px 8px" onclick="ack(${a.id})">Ack</button>`:'<span style="font-size:10px;color:var(--green)">Acked</span>'}
<button class="btn-s" style="font-size:11px;padding:3px 8px" onclick="dismiss(${a.id})">x</button>
</div></div>`).join('');
  const all=alerts.filter(a=>!a.ack);
  document.getElementById('m-al').textContent=all.length;
  document.getElementById('m-cr').textContent=all.filter(a=>a.sev==='critical').length;
  document.getElementById('m-wa').textContent=all.filter(a=>a.sev==='warning').length;
  document.getElementById('m-in').textContent=all.filter(a=>a.sev==='info').length;
}
function ack(id){alerts.find(a=>a.id===id).ack=true;render();T('Alert acknowledged');}
function dismiss(id){alerts=alerts.filter(a=>a.id!==id);render();T('Dismissed');}
function clearAll(){alerts=[];render();T('All cleared');}
function addTestAlert(){alerts.unshift({id:Date.now(),sev:'info',msg:'Test alert',src:'System',time:new Date().toTimeString().slice(0,5),ack:false});render();T('Test alert created','#4a7cff');}
render();
</script><div class="toast" id="_t"></div>
<footer class="foot"><span>Prime Alpha Securities</span> · Portfolio Monitor Alerts · Confidential</footer>
<script>function toggleTheme(){
  const d=document.documentElement,c=d.getAttribute('data-theme')||'dark',n=c==='dark'?'light':'dark';
  d.setAttribute('data-theme',n);localStorage.setItem('pas_t',n);
  document.querySelectorAll('.tb').forEach(b=>b.textContent=n==='dark'?'\u2600 Light':'\u25d1 Dark');
  if(typeof onTc==='function')onTc(n);
}
(function(){const t=localStorage.getItem('pas_t')||'dark';document.documentElement.setAttribute('data-theme',t);
window.addEventListener('DOMContentLoaded',()=>document.querySelectorAll('.tb').forEach(b=>b.textContent=t==='dark'?'\u2600 Light':'\u25d1 Dark'));})();
function T(msg,c){const t=document.getElementById('_t');if(!t)return;t.textContent=msg;t.style.background=c||'#1fc98a';t.classList.add('show');clearTimeout(t._x);t._x=setTimeout(()=>t.classList.remove('show'),2500);}
function oM(id){document.getElementById(id).classList.add('open');}
function cM(id){document.getElementById(id).classList.remove('open');}</script></body></html>
